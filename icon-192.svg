<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C0F16"/>
      <stop offset="100%" style="stop-color:#121720"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E5B04A"/>
      <stop offset="100%" style="stop-color:#C8922A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- Border ring -->
  <rect x="6" y="6" width="180" height="180" rx="36" fill="none" stroke="#C8922A" stroke-width="2" opacity="0.6"/>
  <!-- Document shape -->
  <rect x="52" y="28" width="88" height="112" rx="8" fill="#1A2030" stroke="#2E3D55" stroke-width="1.5"/>
  <!-- Dog-ear -->
  <path d="M116 28 L140 52 L116 52 Z" fill="#0C0F16"/>
  <path d="M116 28 L140 52" stroke="#2E3D55" stroke-width="1.5" fill="none"/>
  <!-- Lines on doc -->
  <rect x="64" y="64" width="48" height="4" rx="2" fill="#2E3D55"/>
  <rect x="64" y="76" width="56" height="4" rx="2" fill="#2E3D55"/>
  <rect x="64" y="88" width="40" height="4" rx="2" fill="#2E3D55"/>
  <!-- Signature flourish (gold) -->
  <path d="M58 118 Q72 108 82 118 Q92 128 108 112 Q118 102 128 110" stroke="url(#gold)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Seal circle -->
  <circle cx="138" cy="148" r="26" fill="#0C0F16" stroke="#C8922A" stroke-width="2"/>
  <circle cx="138" cy="148" r="20" fill="none" stroke="#C8922A" stroke-width="1" opacity="0.4"/>
  <!-- Checkmark in seal -->
  <path d="M128 148 L135 155 L150 140" stroke="#C8922A" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
