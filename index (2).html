<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
  <title>IntelleSig — O&G Signing</title>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#C8922A"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="IntelleSig"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; overscroll-behavior: none; }
    body { height: 100%; min-height: 100dvh; background: #080A10; color: #DCE5F2; font-family: 'IBM Plex Sans', sans-serif; overscroll-behavior: none; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100dvh; display: flex; flex-direction: column; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #0C0F16; }
    ::-webkit-scrollbar-thumb { background: #252D3E; border-radius: 3px; }

    @keyframes fadeUp    { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn    { from{opacity:0} to{opacity:1} }
    @keyframes slideInR  { from{transform:translateX(100%)} to{transform:translateX(0)} }
    @keyframes pulse     { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes spin      { to{transform:rotate(360deg)} }
    @keyframes checkPop  { 0%{transform:scale(0)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }
    @keyframes scanLine  { 0%{top:0%;opacity:1}48%{top:94%;opacity:1}50%{top:94%;opacity:0}52%{top:0%;opacity:0}54%{top:0%;opacity:1}100%{top:0%;opacity:1} }

    .fade-up   { animation: fadeUp  .32s ease both; }
    .fade-in   { animation: fadeIn  .22s ease; }
    .slide-in-r{ animation: slideInR .28s ease; }
    .pulse     { animation: pulse 1.6s ease-in-out infinite; }
    .spin      { animation: spin 1.0s linear infinite; display:inline-block; }
    .check-pop { animation: checkPop .4s cubic-bezier(.34,1.56,.64,1) both; }

    .btn-base { transition: transform .1s, filter .1s, opacity .15s; cursor: pointer; border: none; }
    .btn-base:hover  { filter: brightness(1.1); }
    .btn-base:active { transform: scale(.96); }
    .btn-base:disabled { opacity: .4; cursor: not-allowed; }

    canvas { touch-action: none; display: block; }

    /* Modal */
    .modal-bg { position:fixed; inset:0; z-index:8888; background:rgba(0,0,0,.82); display:flex; align-items:flex-end; animation:fadeIn .2s; }
    @media(min-width:600px){ .modal-bg { align-items:center; justify-content:center; } }
    .modal-sheet { width:100%; max-height:92dvh; overflow-y:auto; background:#121720; border-radius:18px 18px 0 0; border:1px solid #222C3E; border-bottom:none; animation:fadeUp .25s ease; }
    @media(min-width:600px){ .modal-sheet { width:500px; border-radius:14px; border-bottom:1px solid #222C3E; max-height:88dvh; } }

    /* Sign layout */
    .sign-root { display:flex; flex-direction:column; flex:1; overflow:hidden; min-height:0; }

    /* Field toolbar — horizontal on mobile, vertical on desktop */
    .field-toolbar { background:#0C0F16; border-bottom:1px solid #222C3E; display:flex; flex-direction:row; gap:6px; padding:8px 10px; overflow-x:auto; flex-shrink:0; align-items:center; }
    @media(min-width:768px){ .field-toolbar { flex-direction:column; border-bottom:none; border-right:1px solid #222C3E; padding:12px 8px; width:80px; overflow-x:visible; overflow-y:auto; align-items:stretch; } }

    .tool-btn { border:none; border-radius:8px; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; padding:8px 6px; min-width:56px; flex-shrink:0; transition:all .15s; }
    @media(min-width:768px){ .tool-btn { min-width:unset; width:100%; padding:10px 4px; } }

    /* Canvas area */
    .sign-body { display:flex; flex-direction:row; flex:1; overflow:hidden; min-height:0; }
    .sign-canvas-area { flex:1; overflow:auto; background:#374151; display:flex; justify-content:center; align-items:flex-start; padding:20px 12px; }

    /* Action bar */
    .action-bar { background:#0C0F16; border-top:1px solid #222C3E; padding:10px 14px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; flex-shrink:0; }

    /* Doc log panel */
    .log-panel { position:fixed; inset:0; z-index:8000; background:rgba(0,0,0,.72); animation:fadeIn .2s; }
    .log-drawer { position:absolute; top:0; right:0; bottom:0; width:100%; max-width:380px; background:#0C0F16; border-left:1px solid #222C3E; display:flex; flex-direction:column; animation:slideInR .28s ease; }

    /* ID verification */
    .id-zone { border:2px dashed #222C3E; border-radius:10px; padding:24px 14px; text-align:center; cursor:pointer; background:#121720; transition:all .2s; position:relative; overflow:hidden; }
    .id-zone:hover,.id-zone.over { border-color:#C8922A; background:rgba(200,146,42,.06); }
    .id-zone.has-file { border-color:#16A34A; background:rgba(22,163,74,.06); border-style:solid; cursor:default; }
    .scan-overlay { position:absolute; inset:0; pointer-events:none; }
    .scan-line { position:absolute; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,#C8922A,#E5B04A,#C8922A,transparent); animation:scanLine 2.2s ease-in-out infinite; box-shadow:0 0 10px #C8922A88; }

    /* Webcam */
    .webcam-frame { position:relative; background:#06080E; border-radius:12px; overflow:hidden; border:2px solid #222C3E; aspect-ratio:4/3; width:100%; max-width:400px; margin:0 auto; }
    .webcam-frame video { width:100%; height:100%; object-fit:cover; display:block; transform:scaleX(-1); }
    .face-guide { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
    .face-oval { width:48%; aspect-ratio:3/4; border:2px solid rgba(200,146,42,.75); border-radius:50%; box-shadow:0 0 0 9999px rgba(0,0,0,.42); }

    /* Step bar */
    .step-bar { display:flex; align-items:center; }
    .step-dot { width:24px; height:24px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; }
    .step-lbl { display:none; font-size:10px; margin-left:4px; }
    @media(min-width:520px){ .step-lbl{ display:inline; } }

    /* Feature grid */
    .feat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    @media(min-width:640px){ .feat-grid { grid-template-columns:repeat(4,1fr); } }

    /* Form fields */
    .fl { color:#5C6D84; font-size:10px; display:block; margin-bottom:5px; font-family:'IBM Plex Mono',monospace; letter-spacing:1.2px; text-transform:uppercase; }
    .fi { width:100%; background:#121720; border:1px solid #222C3E; color:#DCE5F2; padding:10px 12px; border-radius:7px; font-size:14px; font-family:'IBM Plex Sans',sans-serif; outline:none; transition:border-color .18s; }
    .fi:focus { border-color:#C8922A; }
    .fi::placeholder { color:#3A4A5C; }
    select.fi { cursor:pointer; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js" crossorigin></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

// ── THEME ──────────────────────────────────────────────────────────────
const T = {
  bg0:'#080A10',bg1:'#0C0F16',bg2:'#121720',bg3:'#1A2030',
  border:'#222C3E',borderHi:'#2E3D55',
  accent:'#C8922A',accentHi:'#E5B04A',accentGlow:'rgba(200,146,42,.15)',
  text:'#DCE5F2',muted:'#5C6D84',dim:'#3A4A5C',
  success:'#16A34A',danger:'#DC2626',info:'#2563EB',
};

// ── FIELD TYPES ────────────────────────────────────────────────────────
const FT = {
  signature: { icon:'✍️', label:'Sig',      color:'#2563EB', bg:'rgba(37,99,235,.09)',   minW:120,minH:40, dW:180,dH:60  },
  initials:  { icon:'SI', label:'Initials', color:'#0891B2', bg:'rgba(8,145,178,.09)',   minW:50, minH:28, dW:80, dH:44  },
  text:      { icon:'T',  label:'Text',     color:'#D97706', bg:'rgba(217,119,6,.09)',    minW:100,minH:28, dW:200,dH:36  },
  date:      { icon:'📅', label:'Date',     color:'#7C3AED', bg:'rgba(124,58,237,.09)',   minW:130,minH:28, dW:160,dH:36  },
  checkbox:  { icon:'☑', label:'Check',    color:'#6B7280', bg:'rgba(107,114,128,.09)',  minW:24, minH:24, dW:28, dH:28  },
};

const HANDLES = ['nw','n','ne','e','se','s','sw','w'];
const HCUR = { nw:'nw-resize',n:'ns-resize',ne:'ne-resize',e:'ew-resize',se:'se-resize',s:'ns-resize',sw:'sw-resize',w:'ew-resize' };
const HPOS = {
  nw:{top:-5,left:-5},   n:{top:-5,left:'calc(50% - 5px)'},  ne:{top:-5,right:-5},
  e:{top:'calc(50% - 5px)',right:-5}, se:{bottom:-5,right:-5},
  s:{bottom:-5,left:'calc(50% - 5px)'}, sw:{bottom:-5,left:-5},
  w:{top:'calc(50% - 5px)',left:-5},
};

// ── STORAGE ────────────────────────────────────────────────────────────
// TODO: replace localStorage with fetch('/api/docs', ...) when backend is ready
const DocStorage = {
  KEY: 'intellesig_log_v2',
  getAll() { try { return JSON.parse(localStorage.getItem(this.KEY)||'[]'); } catch { return []; } },
  add(doc) {
    const all = this.getAll();
    all.unshift({ ...doc, id: doc.id||Date.now().toString(), date: doc.date||new Date().toISOString() });
    localStorage.setItem(this.KEY, JSON.stringify(all.slice(0,200)));
  },
  update(id, patch) {
    const all = this.getAll();
    const i = all.findIndex(d=>d.id===id);
    if (i>=0) { all[i]={...all[i],...patch}; localStorage.setItem(this.KEY,JSON.stringify(all)); }
  },
  clear() { localStorage.removeItem(this.KEY); },
};

// ── PDF BURN ───────────────────────────────────────────────────────────
async function burnFieldsToPDF(file, fields, cW, cH) {
  const { PDFDocument, rgb, StandardFonts } = PDFLib;
  const pdfDoc = await PDFDocument.load(await file.arrayBuffer());
  const page   = pdfDoc.getPages()[0];
  const { width:pW, height:pH } = page.getSize();
  const font   = await pdfDoc.embedFont(StandardFonts.Helvetica);
  const sx=pW/cW, sy=pH/cH;

  for (const f of fields) {
    const px=f.x*sx, py=pH-(f.y*sy)-(f.h*sy), pw=f.w*sx, ph=f.h*sy;

    if (f.type==='signature'||f.type==='initials') {
      if (!f.value) continue;
      const b64=f.value.replace(/^data:image\/\w+;base64,/,'');
      const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
      let img; try{img=await pdfDoc.embedPng(bytes);}catch{img=await pdfDoc.embedJpg(bytes);}
      page.drawImage(img,{x:px,y:py,width:pw,height:ph});
    }
    else if (f.type==='text' && f.value?.trim()) {
      const lines=f.value.split('\n');
      const fs=Math.max(8,Math.min(14,ph/lines.length-2))*sx;
      lines.forEach((line,i)=>{
        page.drawText(line,{x:px+2*sx, y:py+ph-((i+1)*(fs+2*sy)), size:fs, font, color:rgb(.08,.08,.08), maxWidth:pw-4*sx});
      });
    }
    else if (f.type==='date') {
      const d=f.value?new Date(f.value).toLocaleDateString('en-US'):new Date().toLocaleDateString('en-US');
      const fs=Math.max(8,ph*0.55)*sx;
      page.drawText(d,{x:px+2*sx, y:py+ph/2-fs/2, size:Math.min(fs,12*sx), font, color:rgb(.08,.08,.08)});
    }
    else if (f.type==='checkbox') {
      page.drawRectangle({x:px,y:py,width:pw,height:ph,borderWidth:1,borderColor:rgb(.5,.5,.5),color:rgb(1,1,1)});
      if (f.checked) {
        page.drawLine({start:{x:px+2*sx,y:py+ph/2},end:{x:px+pw*.4,y:py+2*sy},thickness:1.5*sx,color:rgb(.1,.1,.1)});
        page.drawLine({start:{x:px+pw*.4,y:py+2*sy},end:{x:px+pw-2*sx,y:py+ph-3*sy},thickness:1.5*sx,color:rgb(.1,.1,.1)});
      }
    }
  }
  return pdfDoc.save();
}

function dlBytes(bytes,name,mime='application/pdf'){
  const url=URL.createObjectURL(new Blob([bytes],{type:mime}));
  const a=document.createElement('a'); a.href=url; a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),2000);
}

// ── DOC RENDERER HOOK ─────────────────────────────────────────────────
function useDocRenderer(file){
  const cvs=useRef(null);
  const [ready,setReady]=useState(false),[err,setErr]=useState(null),[dims,setDims]=useState({w:0,h:0});
  useEffect(()=>{
    if(!file)return; setReady(false); setErr(null);
    if(file.type.startsWith('image/')){
      const url=URL.createObjectURL(file),img=new Image();
      img.onload=()=>{const c=cvs.current;if(!c)return;c.width=img.naturalWidth;c.height=img.naturalHeight;c.getContext('2d').drawImage(img,0,0);setDims({w:img.naturalWidth,h:img.naturalHeight});setReady(true);URL.revokeObjectURL(url);};
      img.onerror=()=>setErr('Load failed'); img.src=url;
      return()=>URL.revokeObjectURL(url);
    }
    (async()=>{try{
      pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const pdf=await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
      const pg=await pdf.getPage(1),vp=pg.getViewport({scale:1.5});
      const c=cvs.current;if(!c)return;c.width=vp.width;c.height=vp.height;
      await pg.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
      setDims({w:vp.width,h:vp.height});setReady(true);
    }catch(e){setErr(e.message);}})();
  },[file]);
  return {canvasRef:cvs,ready,err,dims};
}

// ── HELPERS ───────────────────────────────────────────────────────────
function isFilled(f){
  if(f.type==='signature'||f.type==='initials') return !!f.value;
  if(f.type==='text') return !!(f.value?.trim());
  if(f.type==='date') return !!f.value;
  if(f.type==='checkbox') return true; // checkbox always counts as filled
  return false;
}

function Spinner({size=28,color=T.accent}){
  return <div className="spin" style={{width:size,height:size,border:`3px solid ${T.border}`,borderTopColor:color,borderRadius:'50%'}}/>;
}

function StatusBadge({status}){
  const C={draft:{c:T.muted,bg:T.bg3,l:'Draft'},signed:{c:T.success,bg:'rgba(22,163,74,.12)',l:'Signed'},notarized:{c:T.accent,bg:T.accentGlow,l:'Notarized'}};
  const s=C[status]||C.draft;
  return <span style={{background:s.bg,color:s.c,fontSize:10,padding:'2px 8px',borderRadius:4,fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,whiteSpace:'nowrap'}}>{s.l}</span>;
}

// ── STEP BAR ──────────────────────────────────────────────────────────
function StepBar({current}){
  const steps=[['upload','Upload'],['verify','Verify ID'],['sign','Sign'],['notarize','Notarize'],['complete','Done']];
  const ci=steps.findIndex(([k])=>k===current);
  return(
    <div className="step-bar">
      {steps.map(([k,label],i)=>(
        <React.Fragment key={k}>
          <div style={{display:'flex',alignItems:'center'}}>
            <div className="step-dot" style={{background:i<ci?T.success:i===ci?T.accent:T.bg3,color:i<ci?'#fff':i===ci?'#000':T.muted,border:i===ci?`2px solid ${T.accentHi}`:'none'}}>
              {i<ci?'✓':i+1}
            </div>
            <span className="step-lbl" style={{color:i===ci?T.text:T.muted}}>{label}</span>
          </div>
          {i<steps.length-1&&<div style={{width:14,height:1,background:i<ci?T.success:T.border,margin:'0 2px'}}/>}
        </React.Fragment>
      ))}
    </div>
  );
}

function NavBar({current,onHome,onLog,logCount}){
  return(
    <div style={{height:56,background:T.bg1,borderBottom:`1px solid ${T.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 14px',position:'sticky',top:0,zIndex:200,flexShrink:0}}>
      <div onClick={onHome} style={{display:'flex',alignItems:'center',gap:9,cursor:'pointer',flexShrink:0}}>
        <div style={{width:34,height:34,borderRadius:9,background:T.accentGlow,border:`1px solid ${T.accent}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>⛽</div>
        <div style={{display:'none',['@media(min-width:400px)']:{display:'block'}}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:14,color:T.text,fontWeight:700,lineHeight:1}}>IntelleSig</div>
          <div style={{fontSize:9,color:T.muted,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:'1px'}}>O&G PLATFORM</div>
        </div>
      </div>
      {current!=='home'&&<StepBar current={current}/>}
      <button onClick={onLog} className="btn-base" style={{position:'relative',background:T.bg2,border:`1px solid ${T.border}`,borderRadius:7,padding:'6px 10px',color:T.text,fontSize:12,display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
        <span>📋</span><span style={{display:'none'}}>Log</span>
        {logCount>0&&<span style={{position:'absolute',top:-5,right:-5,width:16,height:16,background:T.accent,color:'#000',borderRadius:'50%',fontSize:9,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>{logCount>9?'9+':logCount}</span>}
      </button>
    </div>
  );
}

// ── DOC LOG PANEL ─────────────────────────────────────────────────────
function DocLogPanel({onClose}){
  const [docs,setDocs]=useState(()=>DocStorage.getAll());
  return(
    <div className="log-panel" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="log-drawer">
        <div style={{padding:'16px 18px',borderBottom:`1px solid ${T.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
          <div>
            <h3 style={{fontFamily:"'Playfair Display',serif",color:T.text,fontSize:18}}>Document Log</h3>
            <p style={{color:T.muted,fontSize:11,marginTop:2}}>
              {/* Cloud sync ready — connect backend to POST /api/docs */}
              Local storage · {docs.length} document{docs.length!==1?'s':''}
            </p>
          </div>
          <button onClick={onClose} className="btn-base" style={{background:'none',color:T.muted,fontSize:22,padding:'4px 8px'}}>×</button>
        </div>

        <div style={{flex:1,overflowY:'auto',padding:'12px 14px'}}>
          {docs.length===0?(
            <div style={{textAlign:'center',padding:'48px 20px',color:T.muted}}>
              <div style={{fontSize:36,marginBottom:12}}>📄</div>
              <div style={{fontSize:13}}>No documents yet.</div>
              <div style={{fontSize:12,marginTop:4}}>Sign something to see it here.</div>
            </div>
          ):docs.map(d=>(
            <div key={d.id} style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:10,padding:'14px',marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                <div style={{color:T.text,fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'70%',marginRight:8}}>{d.name}</div>
                <StatusBadge status={d.status}/>
              </div>
              <div style={{color:T.muted,fontSize:11,marginBottom:6}}>{new Date(d.date).toLocaleString()}</div>
              <div style={{display:'flex',gap:14,flexWrap:'wrap'}}>
                {d.signer&&<span style={{color:T.muted,fontSize:11}}>👤 {d.signer}</span>}
                {d.fieldCount>0&&<span style={{color:T.muted,fontSize:11}}>📋 {d.fieldCount} fields</span>}
                {d.fileSize&&<span style={{color:T.muted,fontSize:11}}>💾 {d.fileSize}</span>}
                {d.notary&&<span style={{color:T.accentHi,fontSize:11}}>🔏 {d.notary}</span>}
              </div>
            </div>
          ))}
        </div>

        {docs.length>0&&(
          <div style={{padding:'12px 14px',borderTop:`1px solid ${T.border}`,flexShrink:0}}>
            <button onClick={()=>{DocStorage.clear();setDocs([]);}} className="btn-base" style={{width:'100%',padding:'8px',background:'none',border:`1px solid ${T.border}`,color:T.muted,borderRadius:6,fontSize:12}}>
              🗑 Clear All
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── FIELD CONTENT ─────────────────────────────────────────────────────
function FieldContent({field,cfg,onUpdate,onOpenSig}){
  const today=new Date().toISOString().split('T')[0];

  if(field.type==='signature'||field.type==='initials'){
    return field.value?(
      <img src={field.value} alt={field.type} style={{width:'100%',height:'100%',objectFit:'contain',pointerEvents:'none',display:'block'}} draggable={false}/>
    ):(
      <div onClick={e=>{e.stopPropagation();onOpenSig(field.id,field.type);}}
        onTouchEnd={e=>{e.stopPropagation();e.preventDefault();onOpenSig(field.id,field.type);}}
        style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:cfg.color,fontSize:11,fontWeight:600,fontFamily:"'IBM Plex Sans',sans-serif",gap:4,flexDirection:'column'}}>
        <span style={{fontSize:18}}>{field.type==='signature'?'✍️':'SI'}</span>
        <span style={{fontSize:10}}>{field.type==='signature'?'Tap to sign':'Tap to initial'}</span>
      </div>
    );
  }
  if(field.type==='text'){
    return(
      <textarea value={field.value||''} onChange={e=>onUpdate(field.id,{value:e.target.value})}
        placeholder="Type here…"
        onMouseDown={e=>e.stopPropagation()} onTouchStart={e=>e.stopPropagation()}
        style={{width:'100%',height:'100%',padding:'4px 6px',background:'transparent',border:'none',outline:'none',color:'#111827',fontSize:12,resize:'none',fontFamily:"'IBM Plex Sans',sans-serif",cursor:'text'}}
      />
    );
  }
  if(field.type==='date'){
    return(
      <input type="date" value={field.value||today} onChange={e=>onUpdate(field.id,{value:e.target.value})}
        onMouseDown={e=>e.stopPropagation()} onTouchStart={e=>e.stopPropagation()}
        style={{width:'100%',height:'100%',padding:'4px 6px',background:'transparent',border:'none',outline:'none',color:'#111827',fontSize:11,fontFamily:"'IBM Plex Sans',sans-serif",cursor:'pointer'}}
      />
    );
  }
  if(field.type==='checkbox'){
    return(
      <div onMouseDown={e=>{e.stopPropagation();onUpdate(field.id,{checked:!field.checked});}}
        onTouchEnd={e=>{e.stopPropagation();e.preventDefault();onUpdate(field.id,{checked:!field.checked});}}
        style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:Math.min(field.w,field.h)*0.75,lineHeight:1}}>
        <span style={{color:field.checked?cfg.color:'#9CA3AF'}}>{field.checked?'☑':'☐'}</span>
      </div>
    );
  }
  return null;
}

// ── PLACED FIELD ──────────────────────────────────────────────────────
function PlacedField({field,selected,onSelect,onUpdate,onDelete,onOpenSig}){
  const cfg=FT[field.type];
  const filled=isFilled(field);
  const showReq=field.required&&!filled;
  const borderColor=showReq?T.danger:selected?cfg.color:`${cfg.color}66`;

  const startInteraction=(e,mode)=>{
    e.preventDefault(); e.stopPropagation();
    if(!selected&&mode==='move'){onSelect(field.id);return;}
    const src=e.touches?e.touches[0]:e;
    const st={startX:src.clientX,startY:src.clientY,origX:field.x,origY:field.y,origW:field.w,origH:field.h};

    const onMove=ev=>{
      ev.preventDefault();
      const s=ev.touches?ev.touches[0]:ev;
      const dx=s.clientX-st.startX, dy=s.clientY-st.startY;
      let nx=st.origX,ny=st.origY,nw=st.origW,nh=st.origH;
      if(mode==='move'){ nx=Math.max(0,st.origX+dx); ny=Math.max(0,st.origY+dy); }
      else{
        if(mode.includes('e')) nw=Math.max(cfg.minW,st.origW+dx);
        if(mode.includes('s')) nh=Math.max(cfg.minH,st.origH+dy);
        if(mode.includes('w')){ nw=Math.max(cfg.minW,st.origW-dx); nx=st.origX+st.origW-nw; }
        if(mode.includes('n')){ nh=Math.max(cfg.minH,st.origH-dy); ny=st.origY+st.origH-nh; }
      }
      onUpdate(field.id,{x:nx,y:ny,w:nw,h:nh});
    };
    const onEnd=()=>{
      window.removeEventListener('mousemove',onMove);
      window.removeEventListener('touchmove',onMove);
      window.removeEventListener('mouseup',onEnd);
      window.removeEventListener('touchend',onEnd);
    };
    window.addEventListener('mousemove',onMove,{passive:false});
    window.addEventListener('touchmove',onMove,{passive:false});
    window.addEventListener('mouseup',onEnd);
    window.addEventListener('touchend',onEnd);
  };

  return(
    <div style={{position:'absolute',left:field.x,top:field.y,width:field.w,height:field.h,
      border:`${selected||showReq?2:1}px solid ${borderColor}`,
      borderRadius:field.type==='checkbox'?3:5,
      background:showReq?'rgba(220,38,38,.05)':cfg.bg,
      boxSizing:'border-box',cursor:selected?'move':'pointer',
      userSelect:'none',zIndex:selected?30:10,touchAction:'none',
    }}
      onMouseDown={e=>startInteraction(e,'move')}
      onTouchStart={e=>startInteraction(e,'move')}
    >
      {/* Required badge */}
      {showReq&&<div style={{position:'absolute',top:-10,left:0,background:T.danger,color:'#fff',fontSize:8,padding:'1px 5px',borderRadius:3,fontFamily:"'IBM Plex Mono',monospace",whiteSpace:'nowrap',zIndex:40}}>REQUIRED</div>}

      {/* Type label when selected */}
      {selected&&<div style={{position:'absolute',top:-17,left:0,color:cfg.color,fontSize:9,fontFamily:"'IBM Plex Mono',monospace",textTransform:'uppercase',letterSpacing:'0.5px',whiteSpace:'nowrap'}}>{cfg.label}</div>}

      {/* Content */}
      <FieldContent field={field} cfg={cfg} onUpdate={onUpdate} onOpenSig={onOpenSig}/>

      {selected&&<>
        {/* Delete */}
        <button onMouseDown={e=>{e.stopPropagation();onDelete(field.id);}} onTouchEnd={e=>{e.stopPropagation();e.preventDefault();onDelete(field.id);}}
          style={{position:'absolute',top:-11,right:-11,width:20,height:20,borderRadius:'50%',background:T.danger,color:'#fff',border:'none',cursor:'pointer',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center',padding:0,zIndex:40}}>×</button>

        {/* Required toggle */}
        <button onMouseDown={e=>{e.stopPropagation();onUpdate(field.id,{required:!field.required});}} onTouchEnd={e=>{e.stopPropagation();e.preventDefault();onUpdate(field.id,{required:!field.required});}}
          style={{position:'absolute',bottom:-20,left:0,background:field.required?T.danger:T.bg3,color:field.required?'#fff':T.muted,border:`1px solid ${field.required?T.danger:T.border}`,borderRadius:4,padding:'2px 6px',fontSize:8,cursor:'pointer',fontFamily:"'IBM Plex Mono',monospace",whiteSpace:'nowrap',zIndex:40}}>
          {field.required?'★ Req':'☆ Opt'}
        </button>

        {/* Resize handles */}
        {HANDLES.map(h=>(
          <div key={h} style={{position:'absolute',...HPOS[h],width:10,height:10,background:cfg.color,border:'2px solid #fff',borderRadius:2,cursor:HCUR[h],zIndex:50}}
            onMouseDown={e=>startInteraction(e,h)}
            onTouchStart={e=>startInteraction(e,h)}
          />
        ))}
      </>}
    </div>
  );
}

// ── SIG PAD MODAL ─────────────────────────────────────────────────────
function SigPadModal({mode,onSave,onClose}){
  // mode: 'signature' | 'initials'
  const cvs=useRef(null),last=useRef(null),drag=useRef(false);
  const [tab,setTab]=useState('draw'),[hasPx,setHasPx]=useState(false);
  const [typed,setTyped]=useState(''),[font,setFont]=useState("'Brush Script MT',cursive");
  const isInit=mode==='initials';

  const clearCvs=useCallback(()=>{const c=cvs.current;if(!c)return;const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);setHasPx(false);},[]);
  useEffect(()=>{if(tab==='draw')setTimeout(clearCvs,0);},[tab]);

  const xy=(e,c)=>{const r=c.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return[(s.clientX-r.left)*(c.width/r.width),(s.clientY-r.top)*(c.height/r.height)];};
  const onS=e=>{e.preventDefault();drag.current=true;last.current=xy(e,cvs.current);};
  const onM=e=>{e.preventDefault();if(!drag.current)return;const c=cvs.current,ctx=c.getContext('2d'),[x,y]=xy(e,c);ctx.beginPath();ctx.moveTo(last.current[0],last.current[1]);ctx.lineTo(x,y);ctx.strokeStyle='#0F172A';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();last.current=[x,y];setHasPx(true);};
  const onE=e=>{e?.preventDefault();drag.current=false;last.current=null;};

  const doSave=()=>{
    if(tab==='draw'){if(!hasPx)return;onSave(cvs.current.toDataURL('image/png'));}
    else{if(!typed.trim())return;const t=document.createElement('canvas');t.width=isInit?160:380;t.height=isInit?100:110;const ctx=t.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,t.width,t.height);ctx.fillStyle='#0F172A';ctx.font=`${isInit?48:52}px ${font}`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(typed,t.width/2,t.height/2);onSave(t.toDataURL('image/png'));}
  };
  const Tab=({id,label})=><button onClick={()=>setTab(id)} style={{flex:1,padding:'7px 4px',border:'none',cursor:'pointer',borderRadius:5,fontFamily:"'IBM Plex Sans',sans-serif",fontSize:12,fontWeight:500,background:tab===id?T.accent:'transparent',color:tab===id?'#000':T.muted,transition:'all .15s'}}>{label}</button>;

  return(
    <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-sheet">
        <div style={{display:'flex',justifyContent:'center',padding:'10px 0 4px'}}><div style={{width:36,height:4,borderRadius:2,background:T.border}}/></div>
        <div style={{padding:'4px 20px 24px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
            <h3 style={{fontFamily:"'Playfair Display',serif",color:T.text,fontSize:20}}>{isInit?'Create Initials':'Create Signature'}</h3>
            <button onClick={onClose} className="btn-base" style={{background:'none',color:T.muted,fontSize:24,lineHeight:1,padding:'4px 8px'}}>×</button>
          </div>
          <div style={{display:'flex',gap:4,background:T.bg1,borderRadius:8,padding:4,marginBottom:18}}>
            <Tab id="draw" label="✏️ Draw"/><Tab id="type" label="⌨️ Type"/><Tab id="upload" label="📁 Upload"/>
          </div>
          {tab==='draw'&&<>
            <p style={{color:T.muted,fontSize:12,marginBottom:8}}>Draw with your finger or mouse</p>
            <canvas ref={cvs} width={isInit?240:360} height={isInit?100:150}
              style={{width:'100%',height:isInit?100:150,border:`1px solid ${T.border}`,borderRadius:8,background:'#fff',display:'block',cursor:'crosshair'}}
              onMouseDown={onS} onMouseMove={onM} onMouseUp={onE} onMouseLeave={onE}
              onTouchStart={onS} onTouchMove={onM} onTouchEnd={onE}/>
            <button onClick={clearCvs} className="btn-base" style={{marginTop:8,background:'none',border:`1px solid ${T.border}`,color:T.muted,padding:'5px 14px',borderRadius:5,fontSize:12}}>↺ Clear</button>
          </>}
          {tab==='type'&&<>
            <input type="text" value={typed} onChange={e=>setTyped(e.target.value)} placeholder={isInit?"Your initials…":"Your full name…"} style={{width:'100%',background:T.bg1,border:`1px solid ${T.border}`,color:T.text,padding:'10px 12px',borderRadius:7,fontSize:15,marginBottom:12,fontFamily:'inherit',outline:'none'}}/>
            <div style={{background:'#fff',borderRadius:8,padding:'10px 14px',minHeight:70,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:12}}>
              <span style={{fontFamily:font,fontSize:isInit?36:42,color:'#0F172A'}}>{typed||<span style={{color:'#cbd5e1',fontFamily:"'IBM Plex Sans',sans-serif",fontSize:14}}>Preview</span>}</span>
            </div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {[["'Brush Script MT',cursive",'Elegant'],["Georgia,serif",'Classic'],["'Palatino Linotype',serif",'Formal'],["'Courier New',monospace",'Print']].map(([f,l])=>(
                <button key={f} onClick={()=>setFont(f)} className="btn-base" style={{padding:'4px 12px',borderRadius:5,fontSize:12,fontFamily:f,background:font===f?T.accent:T.bg3,color:font===f?'#000':T.muted,border:`1px solid ${font===f?T.accent:T.border}`}}>{l}</button>
              ))}
            </div>
          </>}
          {tab==='upload'&&(
            <div style={{border:`2px dashed ${T.border}`,borderRadius:10,padding:'32px 20px',textAlign:'center'}}>
              <div style={{fontSize:36,marginBottom:10}}>{isInit?'AB':'🖋️'}</div>
              <p style={{color:T.muted,fontSize:13,marginBottom:14}}>Upload a PNG or JPG image</p>
              <input type="file" id="sig-up" accept="image/*" style={{display:'none'}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>onSave(ev.target.result);r.readAsDataURL(f);}}/>
              <label htmlFor="sig-up" style={{display:'inline-block',padding:'9px 24px',background:T.accent,color:'#000',borderRadius:7,cursor:'pointer',fontWeight:700,fontSize:14}}>Choose File</label>
            </div>
          )}
          {tab!=='upload'&&(
            <div style={{display:'flex',gap:10,marginTop:20,justifyContent:'flex-end'}}>
              <button onClick={onClose} className="btn-base" style={{padding:'9px 18px',background:'none',border:`1px solid ${T.border}`,color:T.muted,borderRadius:7,fontSize:13}}>Cancel</button>
              <button onClick={doSave} className="btn-base" style={{padding:'9px 22px',background:T.accent,color:'#000',border:'none',borderRadius:7,fontWeight:700,fontSize:14}}>Use {isInit?'Initials':'Signature'} →</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── SIGN VIEW ─────────────────────────────────────────────────────────
function SignView({file,identity,onDone,onNotarize}){
  const {canvasRef,ready,err,dims}=useDocRenderer(file);
  const [fields,setFields]=useState([]);
  const [selectedId,setSelectedId]=useState(null);
  const [activeTool,setActiveTool]=useState(null);
  const [sigModal,setSigModal]=useState(null); // {fieldId, mode}
  const [saving,setSaving]=useState(false);
  const [validErr,setValidErr]=useState('');
  const canvasWrap=useRef(null);

  const addField=(e)=>{
    if(!activeTool)return;
    e.preventDefault();
    const r=canvasWrap.current.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    const x=src.clientX-r.left, y=src.clientY-r.top;
    const cfg=FT[activeTool];
    const today=new Date().toISOString().split('T')[0];
    const nf={id:Date.now(),type:activeTool,x:Math.max(0,x-cfg.dW/2),y:Math.max(0,y-cfg.dH/2),w:cfg.dW,h:cfg.dH,value:activeTool==='date'?today:'',required:false,checked:false};
    setFields(p=>[...p,nf]);
    setSelectedId(nf.id);
    // keep tool active for multi-place
  };

  const updateField=(id,patch)=>setFields(p=>p.map(f=>f.id===id?{...f,...patch}:f));
  const deleteField=(id)=>{setFields(p=>p.filter(f=>f.id!==id));if(selectedId===id)setSelectedId(null);};
  const openSig=(fieldId,mode)=>setSigModal({fieldId,mode});
  const saveSig=(url)=>{ if(sigModal){updateField(sigModal.fieldId,{value:url}); setSigModal(null); } };

  const validate=()=>{
    const unmet=fields.filter(f=>f.required&&!isFilled(f));
    if(unmet.length>0){setValidErr(`${unmet.length} required field${unmet.length>1?'s are':' is'} unfilled`);return false;}
    setValidErr('');return true;
  };

  const buildForBurn=()=>fields.map(f=>({...f,pageW:dims.w,pageH:dims.h}));

  const handleDone=async()=>{
    if(!validate())return;
    setSaving(true);
    try{
      if(file.name?.endsWith('.pdf')||file.type==='application/pdf'){
        const bytes=await burnFieldsToPDF(file,buildForBurn(),dims.w,dims.h);
        dlBytes(bytes,`signed_${file.name}`);
      }
      onDone(fields,dims);
    }catch(e){alert('Error saving: '+e.message);}
    setSaving(false);
  };

  const handleNotarize=async()=>{
    if(!validate())return;
    setSaving(true);
    try{
      let sf=file;
      if(file.name?.endsWith('.pdf')||file.type==='application/pdf'){
        const bytes=await burnFieldsToPDF(file,buildForBurn(),dims.w,dims.h);
        sf=new File([bytes],file.name,{type:'application/pdf'});
      }
      onNotarize(fields,dims,sf);
    }catch(e){alert('Error: '+e.message);}
    setSaving(false);
  };

  const fieldCount={total:fields.length,filled:fields.filter(isFilled).length,required:fields.filter(f=>f.required).length};

  return(
    <div className="sign-root">
      {sigModal&&<SigPadModal mode={sigModal.mode} onSave={saveSig} onClose={()=>setSigModal(null)}/>}

      {/* Identity banner */}
      {identity&&(
        <div style={{background:`${T.success}0D`,borderBottom:`1px solid ${T.success}28`,padding:'6px 14px',display:'flex',alignItems:'center',gap:8,fontSize:12,flexShrink:0}}>
          <span style={{color:T.success}}>✓</span>
          <span style={{color:T.text,fontWeight:600}}>{identity.firstName} {identity.lastName}</span>
          <span style={{color:T.muted}}>· {identity.email}</span>
          {identity.selfie&&<img src={identity.selfie} alt="" style={{width:22,height:22,borderRadius:'50%',objectFit:'cover',marginLeft:'auto',border:`1px solid ${T.success}`}}/>}
        </div>
      )}

      {/* Field toolbar */}
      <FieldToolbar activeTool={activeTool} onSelect={setActiveTool}/>

      {/* Doc canvas */}
      <div className="sign-body">
        <div className="sign-canvas-area" ref={canvasWrap}
          onClick={activeTool?addField:()=>setSelectedId(null)}
          onTouchStart={activeTool?addField:undefined}
          style={{cursor:activeTool?'crosshair':'default'}}>
          <div style={{position:'relative',display:'inline-block',boxShadow:'0 12px 64px rgba(0,0,0,.7)',userSelect:'none'}}>
            {!ready&&!err&&<div style={{width:Math.min(580,window.innerWidth-32),height:700,background:T.bg2,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14}}><Spinner size={36}/><span style={{color:T.muted,fontSize:13}}>Rendering document…</span></div>}
            {err&&<div style={{width:340,height:360,background:T.bg2,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8}}><span style={{fontSize:32}}>⚠️</span><span style={{color:T.danger,fontSize:13}}>{err}</span></div>}
            <canvas ref={canvasRef} style={{display:ready?'block':'none',maxWidth:'100%'}}/>
            {fields.map(f=>(
              <PlacedField key={f.id} field={f} selected={selectedId===f.id}
                onSelect={id=>{if(!activeTool)setSelectedId(id);}}
                onUpdate={updateField} onDelete={deleteField} onOpenSig={openSig}/>
            ))}
          </div>
        </div>
      </div>

      {/* Action bar */}
      <div className="action-bar">
        <div style={{display:'flex',gap:12,flex:1,alignItems:'center',flexWrap:'wrap'}}>
          <span style={{color:T.muted,fontSize:12}}>
            {fieldCount.total===0?'Add fields from the toolbar above':
             `${fieldCount.filled}/${fieldCount.total} filled${fieldCount.required>0?` · ${fieldCount.required} required`:''}`}
          </span>
          {validErr&&<span style={{color:T.danger,fontSize:12,fontWeight:600}}>⚠ {validErr}</span>}
        </div>
        <div style={{display:'flex',gap:8,flexShrink:0}}>
          <button onClick={handleNotarize} disabled={saving||fields.length===0} className="btn-base"
            style={{padding:'8px 14px',background:'none',color:T.text,border:`1px solid ${T.border}`,borderRadius:7,fontSize:13,whiteSpace:'nowrap'}}>
            {saving?'⏳':'🔏 Notarize'}
          </button>
          <button onClick={handleDone} disabled={saving||fields.length===0} className="btn-base"
            style={{padding:'8px 16px',background:fields.length>0?T.success:T.bg3,color:fields.length>0?'#fff':T.muted,border:'none',borderRadius:7,fontSize:13,fontWeight:700,whiteSpace:'nowrap'}}>
            {saving?'⏳':'✓ Complete & Download'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── NOTARIZE VIEW ─────────────────────────────────────────────────────
const ONENOTARY_KEY ='YOUR_ONENOTARY_API_KEY'; // ← paste key from app.onenotary.us/settings/api
const ONENOTARY_BASE='https://api.onenotary.us/v1';

function NotarizeView({file,signedFile,fields,identity,onComplete,onSkip}){
  const [step,setStep]=useState('form');
  const [sessId,setSessId]=useState(null);
  const [notaryInfo,setNotaryInfo]=useState(null);
  const [errMsg,setErrMsg]=useState('');
  const [tick,setTick]=useState(0);
  const [form,setForm]=useState({docType:'oil_and_gas_lease',state:identity?.state||'TX'});
  const pollRef=useRef(null);

  const DOC_TYPES=[['oil_and_gas_lease','O&G Lease'],['jib','JIB Invoice'],['afe','AFE'],['division_order','Division Order'],['title_opinion','Title Opinion'],['assignment','Assignment'],['deed','Deed'],['affidavit','Affidavit']];
  const STATES=['TX','OK','NM','CO','WY','ND','LA','PA','OH','WV','KS','MT','UT','AK','CA'];

  useEffect(()=>{ if(step!=='connecting')return; const iv=setInterval(()=>setTick(t=>t+1),800); return()=>clearInterval(iv); },[step]);

  useEffect(()=>{
    if(step!=='polling'||!sessId)return;
    // Poll OneNotary for completion every 5 seconds
    pollRef.current=setInterval(async()=>{
      try{
        const res=await fetch(`${ONENOTARY_BASE}/sessions/${sessId}`,{headers:{'Authorization':`Bearer ${ONENOTARY_KEY}`}});
        const data=await res.json();
        if(data.status==='completed'){clearInterval(pollRef.current);setNotaryInfo(data);setStep('done');}
        if(data.status==='failed'){clearInterval(pollRef.current);setErrMsg('Session failed');setStep('error');}
      }catch(e){/* ignore poll errors */}
    },5000);
    return()=>clearInterval(pollRef.current);
  },[step,sessId]);

  const connect=async()=>{
    setStep('connecting');
    try{
      if(ONENOTARY_KEY==='YOUR_ONENOTARY_API_KEY') throw new Error('demo');
      const signerName=`${identity?.firstName||''} ${identity?.lastName||''}`.trim();

      // 1. Create session
      const sess=await fetch(`${ONENOTARY_BASE}/sessions`,{
        method:'POST',
        headers:{'Authorization':`Bearer ${ONENOTARY_KEY}`,'Content-Type':'application/json'},
        body:JSON.stringify({document_type:form.docType,signer_name:signerName,signer_email:identity?.email||'',document_name:file?.name||'document.pdf',notary_state:form.state}),
      }).then(r=>r.json());

      setSessId(sess.session_id);

      // 2. Upload signed document
      const buf=await(signedFile||file).arrayBuffer();
      const fd=new FormData();
      fd.append('document',new Blob([buf],{type:'application/pdf'}),file?.name||'doc.pdf');
      await fetch(`${ONENOTARY_BASE}/sessions/${sess.session_id}/docs`,{method:'POST',headers:{'Authorization':`Bearer ${ONENOTARY_KEY}`},body:fd});

      // 3. Open OneNotary in new tab for video session
      if(sess.redirect_url) window.open(sess.redirect_url,'_blank','noopener');

      // 4. Start polling
      setStep('polling');

  if(step==='error') return(

  // Form

const ID_TYPES=[{id:'dl',icon:'🪪',label:"Driver's License",sub:'Front & back'},{id:'state_id',icon:'🪪',label:'State ID',sub:'Front & back'},{id:'passport',icon:'📘',label:'U.S. Passport',sub:'Photo page only'},{id:'passport_card',icon:'💳',label:'Passport Card',sub:'Front & back'},{id:'military',icon:'🎖️',label:'Military ID',sub:'Front only'},{id:'federal',icon:'🏛️',label:'Federal Employee ID',sub:'Front & back'}];
const US_STATES=['AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA','KS','KY','LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY'];

function IDZone({label,sublabel,value,onChange}){
  const inp=useRef(null),[over,setOver]=useState(false),[scanning,setScanning]=useState(false);
  const handle=f=>{if(!f)return;setScanning(true);const r=new FileReader();r.onload=ev=>setTimeout(()=>{onChange({file:f,dataUrl:ev.target.result});setScanning(false);},1400);r.readAsDataURL(f);};
  return(
    <div className={`id-zone${over?' over':''}${value?' has-file':''}`}
      onDragOver={e=>{e.preventDefault();setOver(true);}} onDragLeave={()=>setOver(false)}
      onDrop={e=>{e.preventDefault();setOver(false);handle(e.dataTransfer.files[0]);}}
      onClick={()=>!value&&inp.current.click()}>
      {scanning&&<div className="scan-overlay"><div className="scan-line"/></div>}
      {!value&&!scanning&&<><div style={{fontSize:28,marginBottom:6}}>📷</div><div style={{color:T.text,fontWeight:600,fontSize:13,marginBottom:3}}>{label}</div><div style={{color:T.muted,fontSize:12}}>{sublabel}</div></>}
      {scanning&&<><div style={{fontSize:24,marginBottom:6}}>🔍</div><div style={{color:T.accentHi,fontSize:12,fontWeight:600}}>Scanning…</div></>}
      {value&&!scanning&&(
        <div style={{position:'relative'}}>
          <img src={value.dataUrl} alt="id" style={{maxWidth:'100%',maxHeight:160,borderRadius:5,objectFit:'contain'}}/>
          <div style={{marginTop:6,display:'flex',alignItems:'center',justifyContent:'center',gap:5}}><span style={{color:T.success}}>✓</span><span style={{color:T.success,fontSize:12,fontWeight:600}}>{value.file.name}</span></div>
          <button onClick={e=>{e.stopPropagation();onChange(null);}} className="btn-base" style={{position:'absolute',top:-8,right:-8,width:20,height:20,background:T.danger,color:'#fff',borderRadius:'50%',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center',padding:0}}>×</button>
        </div>
      )}
      <input ref={inp} type="file" accept="image/*,.pdf" style={{display:'none'}} onChange={e=>handle(e.target.files[0])}/>
    </div>
  );
}

function VerifyView({onVerified}){
  const [step,setStep]=useState(0);
  const [form,setForm]=useState({firstName:'',lastName:'',middleName:'',dob:'',ssn4:'',email:'',phone:'',address:'',city:'',state:'TX',zip:''});
  const [idType,setIdType]=useState('');
  const [idFront,setIdFront]=useState(null);
  const [idBack,setIdBack]=useState(null);
  const [selfie,setSelfie]=useState(null);
  const [camErr,setCamErr]=useState(null);
  const [camReady,setCamReady]=useState(false);
  const [progress,setProgress]=useState(0);
  const videoRef=useRef(null),cvRef=useRef(null),streamRef=useRef(null);
  const needsBack=idType&&idType!=='passport'&&idType!=='military';

  const startCam=useCallback(async()=>{setCamErr(null);setCamReady(false);try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});streamRef.current=s;if(videoRef.current){videoRef.current.srcObject=s;await videoRef.current.play();}setCamReady(true);}catch(e){setCamErr(e.message||'Camera denied');}},[]);
  const stopCam=useCallback(()=>{streamRef.current?.getTracks().forEach(t=>t.stop());streamRef.current=null;setCamReady(false);},[]);
  useEffect(()=>{if(step===4)startCam();else stopCam();return stopCam;},[step]);

  const captureSelfie=()=>{const v=videoRef.current,c=cvRef.current;if(!v||!c)return;c.width=v.videoWidth;c.height=v.videoHeight;c.getContext('2d').drawImage(v,0,0);setSelfie(c.toDataURL('image/jpeg',.92));stopCam();setStep(5);};

  useEffect(()=>{
    if(step!==5)return;setProgress(0);
    const targets=[18,38,58,78,92,100],delays=[450,850,750,900,650,550];let i=0;
    const run=async()=>{if(i>=targets.length){setTimeout(()=>setStep(6),450);return;}await new Promise(r=>setTimeout(r,delays[i]));setProgress(targets[i++]);run();};run();
  },[step]);

  const canNext=()=>{
    if(step===0)return!!(form.firstName&&form.lastName&&form.dob&&form.ssn4&&form.email&&form.address&&form.city&&form.zip);
    if(step===1)return!!idType; if(step===2)return!!idFront;
    if(step===3)return!needsBack||!!idBack; return true;
  };
  const next=()=>{if(step===2&&!needsBack){setStep(4);return;}setStep(s=>s+1);};
  const back=()=>{if(step===4&&!needsBack){setStep(2);return;}setStep(s=>Math.max(0,s-1));};

  if(step===6)return(
    <div className="fade-up" style={{maxWidth:500,margin:'50px auto',padding:'0 18px',textAlign:'center'}}>
      <div className="check-pop" style={{width:72,height:72,borderRadius:'50%',background:T.success,display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,margin:'0 auto 20px'}}>✓</div>
      <h2 style={{fontFamily:"'Playfair Display',serif",color:T.text,fontSize:28,marginBottom:10}}>Identity Verified</h2>
      <p style={{color:T.muted,fontSize:14,lineHeight:1.8,marginBottom:28}}>{form.firstName} {form.lastName}'s identity confirmed. Proceed to sign your document.</p>
      <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:12,padding:'18px',marginBottom:24,textAlign:'left'}}>
        {[['Name',`${form.firstName}${form.middleName?' '+form.middleName:''} ${form.lastName}`],['DOB',form.dob],['Email',form.email],['Address',`${form.address}, ${form.city}, ${form.state} ${form.zip}`],['ID Type',ID_TYPES.find(t=>t.id===idType)?.label||idType],['Status','✓ Passed all checks']].map(([k,v])=>(
          <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:`1px solid ${T.border}`}}>
            <span style={{color:T.muted,fontSize:12}}>{k}</span>
            <span style={{color:k==='Status'?T.success:T.text,fontSize:12,fontWeight:500,maxWidth:'65%',textAlign:'right'}}>{v}</span>
          </div>
        ))}
        {selfie&&<div style={{marginTop:12,display:'flex',alignItems:'center',gap:10}}><img src={selfie} alt="" style={{width:48,height:48,borderRadius:'50%',objectFit:'cover',border:`2px solid ${T.success}`}}/><div><div style={{color:T.text,fontSize:12,fontWeight:600}}>Biometric</div><div style={{color:T.success,fontSize:11}}>✓ Liveness confirmed</div></div></div>}
      </div>
      <button className="btn-base" onClick={()=>onVerified({...form,idType,idFront,idBack,selfie})} style={{padding:'12px 36px',background:T.accent,color:'#000',border:'none',borderRadius:9,fontWeight:700,fontSize:15}}>Proceed to Sign →</button>
    </div>
  );

  if(step===5)return(
    <div className="fade-up" style={{maxWidth:400,margin:'80px auto',padding:'0 20px',textAlign:'center'}}>
      <Spinner size={48}/>
      <h3 style={{fontFamily:"'Playfair Display',serif",color:T.text,fontSize:22,margin:'22px 0 10px'}}>Analyzing Identity…</h3>
      <p style={{color:T.muted,fontSize:13,lineHeight:1.7,marginBottom:28}}>Document checks, biometric comparison, fraud signals.</p>
      <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:10,padding:'16px'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}><span style={{color:T.muted,fontSize:12}}>Progress</span><span style={{color:T.accent,fontSize:12,fontFamily:"'IBM Plex Mono',monospace"}}>{progress}%</span></div>
        <div style={{height:5,background:T.bg3,borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',background:`linear-gradient(90deg,${T.accent},${T.accentHi})`,width:`${progress}%`,transition:'width .4s'}}/></div>
      </div>
    </div>
  );

  return(
    <div className="fade-up" style={{maxWidth:620,margin:'0 auto',padding:'24px 18px 48px',overflowY:'auto'}}>
      <h2 style={{fontFamily:"'Playfair Display',serif",color:T.text,fontSize:22,marginBottom:4}}>Identity Verification</h2>
      <p style={{color:T.muted,fontSize:13,marginBottom:16,lineHeight:1.6}}>Required before signing. All data stays on your device.</p>
      <div style={{display:'flex',justifyContent:'center',gap:8,marginBottom:20}}>
        {Array.from({length:needsBack?5:4},(_,i)=>{const cur=step>=4&&!needsBack?step-1:step;return(<div key={i} style={{width:8,height:8,borderRadius:'50%',background:i===cur?T.accent:i<cur?T.success:T.border,transform:i===cur?'scale(1.3)':'scale(1)',transition:'all .25s'}}/>);})}
      </div>

      {/* Step 0: Personal Info */}
      {step===0&&(
        <div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}><div style={{width:30,height:30,borderRadius:'50%',background:T.accent,color:'#000',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:12,flexShrink:0}}>1</div><h3 style={{color:T.text,fontSize:15,fontWeight:600}}>Personal Information</h3></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div><label className="fl">First Name *</label><input className="fi" value={form.firstName} onChange={e=>setForm(p=>({...p,firstName:e.target.value}))} placeholder="Legal first name"/></div>
            <div><label className="fl">Middle Name</label><input className="fi" value={form.middleName} onChange={e=>setForm(p=>({...p,middleName:e.target.value}))} placeholder="Optional"/></div>
            <div style={{gridColumn:'span 2'}}><label className="fl">Last Name *</label><input className="fi" value={form.lastName} onChange={e=>setForm(p=>({...p,lastName:e.target.value}))} placeholder="Legal last name"/></div>
            <div><label className="fl">Date of Birth *</label><input className="fi" type="date" value={form.dob} onChange={e=>setForm(p=>({...p,dob:e.target.value}))}/></div>
            <div><label className="fl">Last 4 SSN *</label><input className="fi" value={form.ssn4} onChange={e=>setForm(p=>({...p,ssn4:e.target.value.replace(/\D/g,'').slice(0,4)}))} placeholder="••••" maxLength={4} inputMode="numeric"/></div>
            <div style={{gridColumn:'span 2'}}><label className="fl">Email *</label><input className="fi" type="email" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} placeholder="you@example.com"/></div>
            <div><label className="fl">Phone</label><input className="fi" type="tel" value={form.phone} onChange={e=>setForm(p=>({...p,phone:e.target.value}))} placeholder="(555) 555-5555"/></div>
            <div style={{gridColumn:'span 2'}}><label className="fl">Street Address *</label><input className="fi" value={form.address} onChange={e=>setForm(p=>({...p,address:e.target.value}))} placeholder="123 Main St"/></div>
            <div><label className="fl">City *</label><input className="fi" value={form.city} onChange={e=>setForm(p=>({...p,city:e.target.value}))} placeholder="City"/></div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              <div><label className="fl">State *</label><select className="fi" value={form.state} onChange={e=>setForm(p=>({...p,state:e.target.value}))}>{US_STATES.map(s=><option key={s}>{s}</option>)}</select></div>
              <div><label className="fl">ZIP *</label><input className="fi" value={form.zip} onChange={e=>setForm(p=>({...p,zip:e.target.value.slice(0,10)}))} placeholder="77001" inputMode="numeric"/></div>
            </div>
          </div>
        </div>
      )}

      {/* Step 1: ID Type */}
      {step===1&&(
        <div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}><div style={{width:30,height:30,borderRadius:'50%',background:T.accent,color:'#000',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:12,flexShrink:0}}>2</div><h3 style={{color:T.text,fontSize:15,fontWeight:600}}>Select Government-Issued ID</h3></div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:10}}>
            {ID_TYPES.map(t=>(
              <div key={t.id} onClick={()=>setIdType(t.id)} style={{background:T.bg2,border:`2px solid ${idType===t.id?T.accent:T.border}`,borderRadius:10,padding:'14px 12px',cursor:'pointer',transition:'border-color .15s'}}>
                <div style={{fontSize:24,marginBottom:6}}>{t.icon}</div>
                <div style={{color:T.text,fontWeight:600,fontSize:13,marginBottom:2}}>{t.label}</div>
                <div style={{color:T.muted,fontSize:11}}>{t.sub}</div>
                {idType===t.id&&<div style={{color:T.accent,fontSize:10,fontWeight:700,marginTop:6}}>Selected ✓</div>}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Step 2: Front */}
      {step===2&&(
        <div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}><div style={{width:30,height:30,borderRadius:'50%',background:T.accent,color:'#000',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:12,flexShrink:0}}>3</div><div><h3 style={{color:T.text,fontSize:15,fontWeight:600}}>Front of {ID_TYPES.find(t=>t.id===idType)?.label}</h3><p style={{color:T.muted,fontSize:11,marginTop:2}}>Lay flat, good lighting, all corners visible</p></div></div>
          <IDZone label="Upload front of ID" sublabel="Drag & drop or tap to browse" value={idFront} onChange={setIdFront}/>
        </div>
      )}

      {/* Step 3: Back */}
      {step===3&&needsBack&&(
        <div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}><div style={{width:30,height:30,borderRadius:'50%',background:T.accent,color:'#000',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:12,flexShrink:0}}>4</div><div><h3 style={{color:T.text,fontSize:15,fontWeight:600}}>Back of {ID_TYPES.find(t=>t.id===idType)?.label}</h3><p style={{color:T.muted,fontSize:11,marginTop:2}}>Barcode or magnetic stripe side</p></div></div>
          <IDZone label="Upload back of ID" sublabel="Barcode / stripe must be visible" value={idBack} onChange={setIdBack}/>
        </div>
      )}

      {/* Step 4: Selfie */}
      {step===4&&(
        <div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}><div style={{width:30,height:30,borderRadius:'50%',background:T.accent,color:'#000',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:12,flexShrink:0}}>{needsBack?'5':'4'}</div><div><h3 style={{color:T.text,fontSize:15,fontWeight:600}}>Selfie — Liveness Check</h3><p style={{color:T.muted,fontSize:11,marginTop:2}}>Center face in oval, then tap Capture</p></div></div>
          <div className="webcam-frame" style={{border:`2px solid ${camReady?T.accent:T.border}`}}>
            {!camReady&&!camErr&&<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:260,gap:10,background:T.bg1}}><Spinner size={32}/><span style={{color:T.muted,fontSize:13}}>Starting camera…</span></div>}
            {camErr&&<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:260,gap:8,background:T.bg1,padding:'0 20px'}}><span style={{fontSize:28}}>📷</span><span style={{color:T.danger,fontSize:13,textAlign:'center'}}>{camErr}</span><button className="btn-base" onClick={startCam} style={{padding:'7px 16px',background:T.accent,color:'#000',border:'none',borderRadius:6,fontWeight:700,fontSize:12,marginTop:4}}>Retry</button></div>}
            <video ref={videoRef} autoPlay playsInline muted style={{display:camReady?'block':'none'}}/>
            <canvas ref={cvRef} style={{display:'none'}}/>
            {camReady&&<><div className="face-guide"><div className="face-oval"/></div><div style={{position:'absolute',bottom:10,left:'50%',transform:'translateX(-50%)'}}><button className="btn-base" onClick={captureSelfie} style={{padding:'9px 26px',background:T.accent,color:'#000',border:'none',borderRadius:8,fontWeight:700,fontSize:14,boxShadow:'0 4px 18px rgba(0,0,0,.6)'}}>📸 Capture</button></div></>}
          </div>
          {camErr&&<div style={{marginTop:14}}><p style={{color:T.muted,fontSize:12,marginBottom:8,textAlign:'center'}}>Or upload a photo:</p><IDZone label="Upload selfie" sublabel="Front-facing, no sunglasses" value={selfie?{dataUrl:selfie,file:{name:'selfie.jpg'}}:null} onChange={v=>{if(v){setSelfie(v.dataUrl);setStep(5);}else setSelfie(null);}}/></div>}
        </div>
      )}

      {/* Nav */}
      {step<5&&(
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:24}}>
          <button onClick={back} className="btn-base" style={{padding:'9px 16px',background:'none',border:`1px solid ${T.border}`,color:T.muted,borderRadius:7,fontSize:13,visibility:step===0?'hidden':'visible'}}>← Back</button>
          {step<4&&<button onClick={next} disabled={!canNext()} className="btn-base" style={{padding:'9px 24px',background:canNext()?T.accent:T.bg3,color:canNext()?'#000':T.muted,border:'none',borderRadius:7,fontWeight:700,fontSize:14}}>Continue →</button>}
          {step===4&&camErr&&selfie&&<button onClick={()=>setStep(5)} className="btn-base" style={{padding:'9px 24px',background:T.accent,color:'#000',border:'none',borderRadius:7,fontWeight:700,fontSize:14}}>Continue →</button>}
        </div>
      )}
    </div>
  );
}

// ── HOME VIEW ─────────────────────────────────────────────────────────
function HomeView({onStart}){
  return(
    <div className="fade-up" style={{maxWidth:800,margin:'0 auto',padding:'40px 18px 32px'}}>
      <div style={{textAlign:'center',marginBottom:48}}>
        <div style={{display:'inline-flex',alignItems:'center',gap:8,background:T.bg2,border:`1px solid ${T.borderHi}`,borderRadius:8,padding:'5px 14px',marginBottom:24}}>
          <span style={{color:T.accent}}>⛽</span>
          <span style={{color:T.muted,fontSize:10,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:'1.5px'}}>OIL & GAS DOCUMENT PLATFORM</span>
        </div>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:'clamp(24px,6vw,50px)',color:T.text,lineHeight:1.15,marginBottom:16}}>
          Sign. Verify. Notarize.<br/><span style={{color:T.accent,fontStyle:'italic'}}>Like Adobe Sign, built for O&G.</span>
        </h1>
        <p style={{color:T.muted,fontSize:'clamp(13px,2.5vw,16px)',maxWidth:420,margin:'0 auto 32px',lineHeight:1.8}}>
          Identity-verified signing with drag-and-drop fields, required markers, and live OneNotary RON sessions.
        </p>
        <button className="btn-base" onClick={onStart} style={{padding:'13px 38px',background:T.accent,color:'#000',border:'none',borderRadius:10,fontSize:15,fontWeight:700,fontFamily:"'IBM Plex Sans',sans-serif",boxShadow:`0 0 48px ${T.accentGlow},0 4px 24px rgba(0,0,0,.5)`}}>Get Started →</button>
      </div>

      <div className="feat-grid">
        {[
          ['🪪','ID Verification',  "Driver's license, passport, state ID, military ID with liveness selfie check."],
          ['📋','6 Field Types',    'Signature, initials, text, date, checkbox — all resizable with required markers.'],
          ['📍','Drag & Resize',    'Place and resize fields anywhere on the document, just like Adobe Sign.'],
          ['🔏','OneNotary RON',    'Opens a live video session in a new tab. Real API + demo mode included.'],
        ].map(([icon,title,desc])=>(
          <div key={title} style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:10,padding:'16px 14px'}}>
            <div style={{fontSize:24,marginBottom:8}}>{icon}</div>
            <div style={{color:T.text,fontWeight:600,fontSize:13,marginBottom:5}}>{title}</div>
            <div style={{color:T.muted,fontSize:11.5,lineHeight:1.7}}>{desc}</div>
          </div>
        ))}
      </div>

      <div style={{marginTop:24,background:T.bg2,border:`1px solid ${T.border}`,borderRadius:10,padding:'16px 18px',display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:14}}>
        {[['6','Field types'],['8','Resize handles'],['48','States RON'],['256-bit','Encryption']].map(([n,l])=>(
          <div key={l} style={{textAlign:'center'}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:T.accent}}>{n}</div>
            <div style={{color:T.muted,fontSize:11}}>{l}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── UPLOAD VIEW ───────────────────────────────────────────────────────
function UploadView({onFile}){
  const [over,setOver]=useState(false),inp=useRef(null);
  const handle=f=>{if(!f)return;const ok=f.type==='application/pdf'||f.type.startsWith('image/')||f.name?.endsWith('.pdf');if(!ok){alert('Please upload a PDF, PNG, or JPG.');return;}onFile(f);};
  return(
    <div className="fade-up" style={{maxWidth:540,margin:'48px auto',padding:'0 18px'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}><span style={{color:T.accent,fontSize:20}}>📄</span><h2 style={{fontFamily:"'Playfair Display',serif",color:T.text,fontSize:24}}>Upload Document</h2></div>
      <p style={{color:T.muted,fontSize:13,marginBottom:22}}>PDF, PNG, or JPG · Everything processed in your browser</p>
      <div onDragOver={e=>{e.preventDefault();setOver(true);}} onDragLeave={()=>setOver(false)} onDrop={e=>{e.preventDefault();setOver(false);handle(e.dataTransfer.files[0]);}} onClick={()=>inp.current.click()}
        style={{border:`2px dashed ${over?T.accent:T.border}`,borderRadius:12,padding:'52px 20px',textAlign:'center',cursor:'pointer',background:over?T.accentGlow:T.bg2,transition:'all .2s'}}>
        <div style={{fontSize:44,marginBottom:10}}>📄</div>
        <div style={{color:T.text,fontWeight:600,fontSize:16,marginBottom:5}}>{over?'Drop it!':'Tap to choose a file'}</div>
        <div style={{color:T.muted,fontSize:13,marginBottom:18}}>or drag & drop here</div>
        <div style={{display:'flex',justifyContent:'center',gap:6}}>{['PDF','PNG','JPG'].map(t=><span key={t} style={{background:T.bg3,border:`1px solid ${T.border}`,color:T.muted,padding:'2px 9px',borderRadius:4,fontSize:11,fontFamily:"'IBM Plex Mono',monospace"}}>{t}</span>)}</div>
        <input ref={inp} type="file" accept=".pdf,.png,.jpg,.jpeg" style={{display:'none'}} onChange={e=>handle(e.target.files[0])}/>
      </div>
    </div>
  );
}

// ── COMPLETE VIEW ─────────────────────────────────────────────────────
function CompleteView({file,fields,identity,notarized,notaryInfo,onReset}){
  const ts=new Date().toLocaleString();
  useEffect(()=>{
    // Save to document log
    DocStorage.add({
      id:Date.now().toString(),
      name:file?.name||'Unknown',
      status:notarized?'notarized':'signed',
      date:new Date().toISOString(),
      signer:identity?`${identity.firstName} ${identity.lastName}`:'',
      fileSize:file?(file.size/1024).toFixed(1)+' KB':'',
      fieldCount:fields?.length||0,
      notary:notarized?(notaryInfo?.notary_name||'OneNotary RON'):'',
    });
  },[]);
  return(
    <div className="fade-up" style={{maxWidth:500,margin:'48px auto',padding:'0 18px 32px',textAlign:'center'}}>
      <div style={{fontSize:52,marginBottom:14}}>{notarized?'🔏':'✅'}</div>
      <h2 style={{fontFamily:"'Playfair Display',serif",color:T.text,fontSize:28,marginBottom:10}}>Document {notarized?'Notarized':'Signed'}</h2>
      <p style={{color:T.muted,fontSize:14,lineHeight:1.8,maxWidth:380,margin:'0 auto 28px'}}>
        {notarized?`Notarized by ${notaryInfo?.notary_name||'a commissioned officer'}. Legally binding under RON statutes.`:'Digitally signed and ready for distribution.'}
      </p>
      <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:12,padding:'18px',marginBottom:22,textAlign:'left'}}>
        <div style={{color:T.muted,fontSize:9,fontFamily:"'IBM Plex Mono',monospace",textTransform:'uppercase',letterSpacing:'1.8px',marginBottom:12}}>Session Summary</div>
        {[
          ['Document',   file?.name||'—'],
          ['Signer',     identity?`${identity.firstName} ${identity.lastName}`:'—'],
          ['Email',      identity?.email||'—'],
          ['ID Type',    identity?.idType||'—'],
          ['Fields',     `${fields?.length||0} placed`],
          ['Notarized',  notarized?`Yes — ${notaryInfo?.notary_name||'OneNotary'}`:'No'],
          ['Completed',  ts],
          ['Status',     notarized?'🔏 Legally Binding (RON)':'✍️ Digitally Signed'],
        ].map(([k,v])=>(
          <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:`1px solid ${T.border}`}}>
            <span style={{color:T.muted,fontSize:12,flexShrink:0}}>{k}</span>
            <span style={{color:T.text,fontSize:12,fontWeight:500,maxWidth:'62%',textAlign:'right',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{v}</span>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}}>
        <button className="btn-base" style={{padding:'10px 20px',background:T.accent,color:'#000',border:'none',borderRadius:8,fontWeight:700,fontSize:14}}>⬇️ Download PDF</button>
        <button className="btn-base" style={{padding:'10px 16px',background:T.bg2,color:T.text,border:`1px solid ${T.border}`,borderRadius:8,fontSize:13}}>📧 Email Copy</button>
        <button onClick={onReset} className="btn-base" style={{padding:'10px 16px',background:'none',color:T.muted,border:`1px solid ${T.border}`,borderRadius:8,fontSize:13}}>+ New Document</button>
      </div>
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState('home');
  const [file,setFile]=useState(null);
  const [identity,setIdentity]=useState(null);
  const [fields,setFields]=useState([]);
  const [dims,setDims]=useState(null);
  const [signedFile,setSignedFile]=useState(null);
  const [notarized,setNotarized]=useState(false);
  const [notaryInfo,setNotaryInfo]=useState(null);
  const [showLog,setShowLog]=useState(false);
  const [logCount,setLogCount]=useState(()=>DocStorage.getAll().length);

  useEffect(()=>{ if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{}); },[]);
  useEffect(()=>{ if(view==='home') setLogCount(DocStorage.getAll().length); },[view]);

  const reset=()=>{setView('home');setFile(null);setIdentity(null);setFields([]);setDims(null);setSignedFile(null);setNotarized(false);setNotaryInfo(null);};

  return(
    <>
      <NavBar current={view} onHome={reset} onLog={()=>setShowLog(true)} logCount={logCount}/>
      {showLog&&<DocLogPanel onClose={()=>setShowLog(false)}/>}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:view==='sign'?'hidden':'auto',minHeight:0}}>
        {view==='home'     &&<HomeView     onStart={()=>setView('upload')}/>}
        {view==='upload'   &&<UploadView   onFile={f=>{setFile(f);setView('verify');}}/>}
        {view==='verify'   &&<VerifyView   onVerified={id=>{setIdentity(id);setView('sign');}}/>}
        {view==='sign'     &&<SignView     file={file} identity={identity}
            onDone={(f,d)=>{setFields(f);setDims(d);setView('complete');}}
            onNotarize={(f,d,sf)=>{setFields(f);setDims(d);setSignedFile(sf);setView('notarize');}}/>}
        {view==='notarize' &&<NotarizeView file={file} signedFile={signedFile} fields={fields} identity={identity}
            onComplete={(n,info)=>{setNotarized(n);setNotaryInfo(info);setView('complete');}}
            onSkip={()=>setView('complete')}/>}
        {view==='complete' &&<CompleteView file={file} fields={fields} identity={identity} notarized={notarized} notaryInfo={notaryInfo} onReset={reset}/>}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
