<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
  <title>IntelleSig — O&G Signing</title>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#C8922A"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="IntelleSig"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; overscroll-behavior: none; }
    body { height: 100%; min-height: 100dvh; background: #080A10; color: #DCE5F2; font-family: 'IBM Plex Sans', sans-serif; overscroll-behavior: none; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100dvh; display: flex; flex-direction: column; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #0C0F16; }
    ::-webkit-scrollbar-thumb { background: #252D3E; border-radius: 3px; }

    @keyframes fadeUp  { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
    @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes spin    { to{transform:rotate(360deg)} }
    @keyframes scaleIn { from{opacity:0;transform:scale(.93)} to{opacity:1;transform:scale(1)} }
    @keyframes scanLine { 0%{top:0%;opacity:1} 48%{top:94%;opacity:1} 50%{top:94%;opacity:0} 52%{top:0%;opacity:0} 54%{top:0%;opacity:1} 100%{top:0%;opacity:1} }
    @keyframes checkPop { 0%{transform:scale(0)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }

    .fade-up  { animation: fadeUp .32s ease both; }
    .fade-in  { animation: fadeIn .25s ease both; }
    .pulse    { animation: pulse 1.6s ease-in-out infinite; }
    .spin     { animation: spin 1.0s linear infinite; display:inline-block; }
    .check-pop{ animation: checkPop .4s cubic-bezier(.34,1.56,.64,1) both; }

    .btn-base { transition: transform .1s, filter .1s, opacity .15s; cursor: pointer; border: none; }
    .btn-base:hover { filter: brightness(1.08); }
    .btn-base:active { transform: scale(.96); }
    .btn-base:disabled { opacity: .4; cursor: not-allowed; }

    canvas { touch-action: none; }

    .modal-overlay { position:fixed; inset:0; z-index:8888; background:rgba(0,0,0,.82); display:flex; align-items:flex-end; animation:fadeIn .2s ease; }
    @media(min-width:600px){ .modal-overlay{ align-items:center; justify-content:center; } }
    .modal-sheet { width:100%; max-height:92dvh; overflow-y:auto; background:#121720; border-radius:18px 18px 0 0; border:1px solid #222C3E; border-bottom:none; animation:fadeUp .28s ease; }
    @media(min-width:600px){ .modal-sheet{ width:500px; border-radius:14px; border-bottom:1px solid #222C3E; max-height:88dvh; } }

    .sign-layout { display:flex; flex-direction:column; flex:1; overflow:hidden; }
    @media(min-width:768px){ .sign-layout{ flex-direction:row; } }
    .sign-sidebar { background:#0C0F16; border-bottom:1px solid #222C3E; padding:12px 14px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    @media(min-width:768px){ .sign-sidebar{ width:220px; flex-shrink:0; flex-direction:column; border-bottom:none; border-right:1px solid #222C3E; align-items:stretch; padding:18px 14px; overflow-y:auto; } }
    .sign-canvas-area { flex:1; overflow:auto; background:#374151; display:flex; justify-content:center; align-items:flex-start; padding:20px 12px; min-height:0; }

    .id-zone { border:2px dashed #222C3E; border-radius:10px; padding:28px 16px; text-align:center; cursor:pointer; background:#121720; transition:all .2s; position:relative; overflow:hidden; }
    .id-zone:hover,.id-zone.over { border-color:#C8922A; background:rgba(200,146,42,.07); }
    .id-zone.has-file { border-color:#16A34A; background:rgba(22,163,74,.08); border-style:solid; cursor:default; }
    .scan-overlay { position:absolute; inset:0; pointer-events:none; }
    .scan-line { position:absolute; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,#C8922A,#E5B04A,#C8922A,transparent); animation:scanLine 2.2s ease-in-out infinite; box-shadow:0 0 12px #C8922A88; }

    .webcam-frame { position:relative; background:#06080E; border-radius:12px; overflow:hidden; border:2px solid #222C3E; aspect-ratio:4/3; width:100%; max-width:420px; margin:0 auto; }
    .webcam-frame video { width:100%; height:100%; object-fit:cover; display:block; transform:scaleX(-1); }
    .face-guide { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
    .face-oval { width:48%; aspect-ratio:3/4; border:2px solid rgba(200,146,42,.75); border-radius:50%; box-shadow:0 0 0 9999px rgba(0,0,0,.42); }

    .id-step-dots { display:flex; justify-content:center; gap:8px; margin:16px 0; }
    .id-step-dot { width:8px; height:8px; border-radius:50%; background:#222C3E; transition:all .25s; }
    .id-step-dot.active { background:#C8922A; transform:scale(1.3); }
    .id-step-dot.done { background:#16A34A; }

    .step-bar { display:flex; align-items:center; }
    .step-dot { width:24px; height:24px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; }
    .step-label { display:none; font-size:10px; margin-left:4px; }
    @media(min-width:520px){ .step-label{ display:inline; } }
    .step-line { flex-shrink:0; height:1px; width:14px; margin:0 2px; }

    .feature-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    @media(min-width:640px){ .feature-grid{ grid-template-columns:repeat(4,1fr); gap:14px; } }

    .field-label { color:#5C6D84; font-size:10px; display:block; margin-bottom:5px; font-family:'IBM Plex Mono',monospace; letter-spacing:1.2px; text-transform:uppercase; }
    .field-input { width:100%; background:#121720; border:1px solid #222C3E; color:#DCE5F2; padding:10px 12px; border-radius:7px; font-size:14px; font-family:'IBM Plex Sans',sans-serif; outline:none; transition:border-color .18s; }
    .field-input:focus { border-color:#C8922A; }
    .field-input::placeholder { color:#3A4A5C; }
    select.field-input { cursor:pointer; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js" crossorigin></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

const T = {
  bg0:'#080A10',bg1:'#0C0F16',bg2:'#121720',bg3:'#1A2030',bg4:'#212840',
  border:'#222C3E',borderHi:'#2E3D55',
  accent:'#C8922A',accentHi:'#E5B04A',accentGlow:'rgba(200,146,42,.15)',
  text:'#DCE5F2',muted:'#5C6D84',dim:'#3A4A5C',
  success:'#16A34A',danger:'#DC2626',info:'#2563EB',warn:'#D97706',
};

// ─── PDF UTILS ────────────────────────────────────────────────────────
async function burnSignaturesToPDF(file, placements) {
  const { PDFDocument } = PDFLib;
  const pdfDoc = await PDFDocument.load(await file.arrayBuffer());
  const page = pdfDoc.getPages()[0];
  const { width: pW, height: pH } = page.getSize();
  for (const p of placements) {
    const b64 = p.dataUrl.replace(/^data:image\/\w+;base64,/,'');
    const bytes = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
    let img; try { img=await pdfDoc.embedPng(bytes); } catch { img=await pdfDoc.embedJpg(bytes); }
    const sx=pW/p.pageW, sy=pH/p.pageH;
    page.drawImage(img,{x:p.x*sx, y:pH-(p.y*sy)-(50*sy), width:140*sx, height:50*sy});
  }
  return pdfDoc.save();
}
function dlBytes(bytes,name,mime='application/pdf'){
  const url=URL.createObjectURL(new Blob([bytes],{type:mime}));
  const a=document.createElement('a'); a.href=url; a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),2000);
}

// ─── HOOK: PDF/IMAGE RENDERER ─────────────────────────────────────────
function useDocRenderer(file){
  const cvs=useRef(null);
  const [ready,setReady]=useState(false),[err,setErr]=useState(null),[dims,setDims]=useState({w:0,h:0});
  useEffect(()=>{
    if(!file)return; setReady(false); setErr(null);
    if(file.type.startsWith('image/')){
      const url=URL.createObjectURL(file), img=new Image();
      img.onload=()=>{const c=cvs.current;if(!c)return;c.width=img.naturalWidth;c.height=img.naturalHeight;c.getContext('2d').drawImage(img,0,0);setDims({w:img.naturalWidth,h:img.naturalHeight});setReady(true);URL.revokeObjectURL(url);};
      img.onerror=()=>setErr('Image load failed'); img.src=url;
      return()=>URL.revokeObjectURL(url);
    }
    (async()=>{try{
      pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const pdf=await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
      const pg=await pdf.getPage(1), vp=pg.getViewport({scale:1.5});
      const c=cvs.current; if(!c)return; c.width=vp.width; c.height=vp.height;
      await pg.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
      setDims({w:vp.width,h:vp.height}); setReady(true);
    }catch(e){setErr(e.message);}})();
  },[file]);
  return {canvasRef:cvs,ready,err,dims};
}

// ─── SHARED SMALL COMPONENTS ──────────────────────────────────────────
function Spinner({size=28,color=T.accent}){
  return <div className="spin" style={{width:size,height:size,border:`3px solid ${T.border}`,borderTopColor:color,borderRadius:'50%'}}/>;
}

function StepBar({current}){
  const steps=[['upload','Upload'],['verify','Verify ID'],['sign','Sign'],['notarize','Notarize'],['complete','Done']];
  const ci=steps.findIndex(([k])=>k===current);
  return(
    <div className="step-bar">
      {steps.map(([k,label],i)=>(
        <React.Fragment key={k}>
          <div style={{display:'flex',alignItems:'center'}}>
            <div className="step-dot" style={{background:i<ci?T.success:i===ci?T.accent:T.bg3,color:i<ci?'#fff':i===ci?'#000':T.muted,border:i===ci?`2px solid ${T.accentHi}`:'none'}}>
              {i<ci?'✓':i+1}
            </div>
            <span className="step-label" style={{color:i===ci?T.text:T.muted}}>{label}</span>
          </div>
          {i<steps.length-1&&<div className="step-line" style={{background:i<ci?T.success:T.border}}/>}
        </React.Fragment>
      ))}
    </div>
  );
}

function NavBar({current,onHome}){
  return(
    <div style={{height:56,background:T.bg1,borderBottom:`1px solid ${T.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 16px',position:'sticky',top:0,zIndex:200}}>
      <div onClick={onHome} style={{display:'flex',alignItems:'center',gap:9,cursor:'pointer',flexShrink:0}}>
        <div style={{width:34,height:34,borderRadius:9,background:T.accentGlow,border:`1px solid ${T.accent}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>⛽</div>
        <div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:14,color:T.text,fontWeight:700,lineHeight:1}}>IntelleSig</div>
          <div style={{fontSize:9,color:T.muted,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:'1px'}}>O&G PLATFORM</div>
        </div>
      </div>
      {current!=='home'&&<StepBar current={current}/>}
      <div style={{width:80}}/>
    </div>
  );
}

// ─── ID UPLOAD ZONE ───────────────────────────────────────────────────
function IDZone({label,sublabel,value,onChange}){
  const inp=useRef(null),[over,setOver]=useState(false),[scanning,setScanning]=useState(false);
  const handle=f=>{
    if(!f)return; setScanning(true);
    const r=new FileReader();
    r.onload=ev=>setTimeout(()=>{onChange({file:f,dataUrl:ev.target.result});setScanning(false);},1500);
    r.readAsDataURL(f);
  };
  return(
    <div className={`id-zone${over?' over':''}${value?' has-file':''}`}
      onDragOver={e=>{e.preventDefault();setOver(true);}} onDragLeave={()=>setOver(false)}
      onDrop={e=>{e.preventDefault();setOver(false);handle(e.dataTransfer.files[0]);}}
      onClick={()=>!value&&inp.current.click()}>
      {scanning&&<div className="scan-overlay"><div className="scan-line"/></div>}
      {!value&&!scanning&&<>
        <div style={{fontSize:32,marginBottom:8}}>📷</div>
        <div style={{color:T.text,fontWeight:600,fontSize:13,marginBottom:4}}>{label}</div>
        <div style={{color:T.muted,fontSize:12,marginBottom:12}}>{sublabel}</div>
        <div style={{display:'flex',justifyContent:'center',gap:6}}>
          {['JPG','PNG','PDF'].map(t=><span key={t} style={{background:T.bg3,border:`1px solid ${T.border}`,color:T.muted,padding:'1px 8px',borderRadius:3,fontSize:10,fontFamily:"'IBM Plex Mono',monospace"}}>{t}</span>)}
        </div>
      </>}
      {scanning&&<><div style={{fontSize:28,marginBottom:8}}>🔍</div><div style={{color:T.accentHi,fontSize:13,fontWeight:600}}>Scanning…</div></>}
      {value&&!scanning&&(
        <div style={{position:'relative'}}>
          <img src={value.dataUrl} alt="id" style={{maxWidth:'100%',maxHeight:180,borderRadius:6,objectFit:'contain'}}/>
          <div style={{marginTop:8,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
            <span style={{color:T.success,fontSize:16}}>✓</span>
            <span style={{color:T.success,fontSize:12,fontWeight:600}}>{value.file.name}</span>
          </div>
          <button onClick={e=>{e.stopPropagation();onChange(null);}} className="btn-base"
            style={{position:'absolute',top:-8,right:-8,width:22,height:22,background:T.danger,color:'#fff',borderRadius:'50%',fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',padding:0}}>×</button>
        </div>
      )}
      <input ref={inp} type="file" accept="image/*,.pdf" style={{display:'none'}} onChange={e=>handle(e.target.files[0])}/>
    </div>
  );
}

// ─── IDENTITY VERIFICATION WIZARD ─────────────────────────────────────
const ID_TYPES=[
  {id:'dl',           icon:'🪪', label:"Driver's License",      sub:'Front & back required'},
  {id:'state_id',     icon:'🪪', label:'State ID Card',         sub:'Front & back required'},
  {id:'passport',     icon:'📘', label:'U.S. Passport',         sub:'Photo page only'},
  {id:'passport_card',icon:'💳', label:'U.S. Passport Card',    sub:'Front & back required'},
  {id:'military',     icon:'🎖️', label:'Military ID (CAC)',     sub:'Front only'},
  {id:'federal',      icon:'🏛️', label:'Federal Employee ID',   sub:'Front & back required'},
];
const US_STATES=['AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA','KS','KY','LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY'];

function VerifyView({onVerified}){
  const [step,setStep]=useState(0);
  const [form,setForm]=useState({firstName:'',lastName:'',middleName:'',dob:'',ssn4:'',email:'',phone:'',address:'',city:'',state:'TX',zip:''});
  const [idType,setIdType]=useState('');
  const [idFront,setIdFront]=useState(null);
  const [idBack,setIdBack]=useState(null);
  const [selfie,setSelfie]=useState(null);
  const [camErr,setCamErr]=useState(null);
  const [camReady,setCamReady]=useState(false);
  const [progress,setProgress]=useState(0);
  const videoRef=useRef(null), cvRef=useRef(null), streamRef=useRef(null);

  const needsBack = idType&&idType!=='passport'&&idType!=='military';

  const startCam=useCallback(async()=>{
    setCamErr(null); setCamReady(false);
    try{
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
      streamRef.current=stream;
      if(videoRef.current){videoRef.current.srcObject=stream; await videoRef.current.play();}
      setCamReady(true);
    }catch(e){setCamErr(e.message||'Camera access denied');}
  },[]);

  const stopCam=useCallback(()=>{
    streamRef.current?.getTracks().forEach(t=>t.stop());
    streamRef.current=null; setCamReady(false);
  },[]);

  useEffect(()=>{ if(step===4) startCam(); else stopCam(); return stopCam; },[step]);

  const captureSelfie=()=>{
    const v=videoRef.current,c=cvRef.current; if(!v||!c)return;
    c.width=v.videoWidth; c.height=v.videoHeight;
    c.getContext('2d').drawImage(v,0,0);
    setSelfie(c.toDataURL('image/jpeg',0.92));
    stopCam(); setStep(5);
  };

  // Analysis animation
  useEffect(()=>{
    if(step!==5)return;
    setProgress(0);
    const targets=[18,38,58,78,92,100];
    const delays=[450,850,750,900,650,550];
    let i=0;
    const run=async()=>{
      if(i>=targets.length){setTimeout(()=>setStep(6),450);return;}
      await new Promise(r=>setTimeout(r,delays[i]));
      setProgress(targets[i++]); run();
    };
    run();
  },[step]);

  const canNext=()=>{
    if(step===0)return!!(form.firstName&&form.lastName&&form.dob&&form.ssn4&&form.email&&form.address&&form.city&&form.zip);
    if(step===1)return!!idType;
    if(step===2)return!!idFront;
    if(step===3)return!needsBack||!!idBack;
    return true;
  };

  const next=()=>{
    // Skip back-of-ID step if not needed
    if(step===2&&!needsBack){setStep(4);return;}
    setStep(s=>s+1);
  };
  const back=()=>{
    if(step===4&&!needsBack){setStep(2);return;}
    setStep(s=>Math.max(0,s-1));
  };

  const visSteps = needsBack?5:4;
  const dotIdx   = step>=4&&!needsBack ? step-1 : step;

  // ── Verified
  if(step===6)return(
    <div className="fade-up" style={{maxWidth:520,margin:'60px auto',padding:'0 20px',textAlign:'center'}}>
      <div className="check-pop" style={{width:80,height:80,borderRadius:'50%',background:T.success,display:'flex',alignItems:'center',justifyContent:'center',fontSize:40,margin:'0 auto 24px'}}>✓</div>
      <h2 style={{fontFamily:"'Playfair Display',serif",color:T.text,fontSize:30,marginBottom:10}}>Identity Verified</h2>
      <p style={{color:T.muted,fontSize:14,lineHeight:1.8,maxWidth:380,margin:'0 auto 32px'}}>
        {form.firstName} {form.lastName}'s identity has been successfully confirmed. You may now proceed to sign your document.
      </p>
      <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:12,padding:'18px 20px',marginBottom:28,textAlign:'left'}}>
        <div style={{color:T.muted,fontSize:9,fontFamily:"'IBM Plex Mono',monospace",textTransform:'uppercase',letterSpacing:'1.8px',marginBottom:14}}>Verified Identity Record</div>
        {[
          ['Full Name', `${form.firstName}${form.middleName?' '+form.middleName:''} ${form.lastName}`],
          ['Date of Birth', form.dob],
          ['Email', form.email],
          ['Phone', form.phone||'—'],
          ['Address', `${form.address}, ${form.city}, ${form.state} ${form.zip}`],
          ['ID Type', ID_TYPES.find(t=>t.id===idType)?.label||idType],
          ['Verified', new Date().toLocaleString()],
          ['Status', '✓ Passed all checks'],
        ].map(([k,v])=>(
          <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',padding:'7px 0',borderBottom:`1px solid ${T.border}`}}>
            <span style={{color:T.muted,fontSize:12,flexShrink:0,minWidth:90}}>{k}</span>
            <span style={{color:k==='Status'?T.success:T.text,fontSize:12,fontWeight:500,textAlign:'right',marginLeft:12}}>{v}</span>
          </div>
        ))}
        {selfie&&(
          <div style={{marginTop:14,display:'flex',alignItems:'center',gap:12}}>
            <img src={selfie} alt="selfie" style={{width:52,height:52,borderRadius:'50%',objectFit:'cover',border:`2px solid ${T.success}`}}/>
            <div>
              <div style={{color:T.text,fontSize:12,fontWeight:600}}>Biometric Capture</div>
              <div style={{color:T.success,fontSize:11}}>✓ Liveness confirmed</div>
            </div>
          </div>
        )}
      </div>
      <button className="btn-base" onClick={()=>onVerified({...form,idType,idFront,idBack,selfie})}
        style={{padding:'13px 40px',background:T.accent,color:'#000',border:'none',borderRadius:9,fontWeight:700,fontSize:15,boxShadow:`0 0 32px ${T.accentGlow}`}}>
        Proceed to Sign Document →
      </button>
    </div>
  );

  // ── Analysis
  if(step===5)return(
    <div className="fade-up" style={{maxWidth:440,margin:'80px auto',padding:'0 20px',textAlign:'center'}}>
      <Spinner size={52}/>
      <h3 style={{fontFamily:"'Playfair Display',serif",color:T.text,fontSize:24,margin:'24px 0 10px'}}>Analyzing Identity…</h3>
      <p style={{color:T.muted,fontSize:13,lineHeight:1.7,marginBottom:32}}>Running document checks, biometric comparison, and fraud signals.</p>
      <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:10,padding:'18px 20px'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>

        {Array.from({length:visSteps},(_,i)=>(

        <span>Your identity documents are processed locally. Images are only transmitted to a notary officer during a live session, with your explicit consent.</span>
      </div>

      {/* ══ STEP 0 — Personal Info ══ */}
      {step===0&&(
        <div>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>
            <div style={{width:32,height:32,borderRadius:'50%',background:T.accent,color:'#000',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:13,flexShrink:0}}>1</div>
            <h3 style={{color:T.text,fontSize:16,fontWeight:600}}>Personal Information</h3>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>

            </div>
            <div>

              <input className="field-input" value={form.middleName} onChange={e=>setForm(p=>({...p,middleName:e.target.value}))} placeholder="Optional"/>

          <div style={{marginTop:14,display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
            {[['📊','Barcode clear','Full barcode in frame'],['💡','Even light','No shadows on barcode'],['📐','Flat & straight','Lay card completely flat']].map(([i,h,d])=>(
              <div key={h} style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:8,padding:'10px',textAlign:'center'}}>
                <div style={{fontSize:18,marginBottom:4}}>{i}</div>
                <div style={{color:T.text,fontSize:11,fontWeight:600}}>{h}</div>
                <div style={{color:T.muted,fontSize:10,marginTop:2}}>{d}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ══ STEP 4 — Selfie ══ */}
      {step===4&&(
        <div>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>
            <div style={{width:32,height:32,borderRadius:'50%',background:T.accent,color:'#000',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:13,flexShrink:0}}>
              {needsBack?'5':'4'}
            </div>
            <div>
              <h3 style={{color:T.text,fontSize:16,fontWeight:600}}>Selfie — Liveness Check</h3>
              <p style={{color:T.muted,fontSize:12,marginTop:2}}>Center your face in the oval, then tap Capture</p>
            </div>
          </div>

          <div className="webcam-frame" style={{border:`2px solid ${camReady?T.accent:T.border}`}}>
            {!camReady&&!camErr&&(
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:300,gap:12,background:T.bg1}}>
                <Spinner size={36}/><span style={{color:T.muted,fontSize:13}}>Starting camera…</span>
              </div>
            )}
            {camErr&&(
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:300,gap:10,background:T.bg1,padding:'0 20px'}}>
                <span style={{fontSize:32}}>📷</span>
                <span style={{color:T.danger,fontSize:13,textAlign:'center'}}>Camera unavailable</span>
                <span style={{color:T.muted,fontSize:12,textAlign:'center'}}>{camErr}</span>

              </div>

                  style={{padding:'10px 28px',background:T.accent,color:'#000',border:'none',borderRadius:8,fontWeight:700,fontSize:14,boxShadow:'0 4px 20px rgba(0,0,0,.6)'}}>
                  📸 Capture
                </button>
              </div>
            )}
          </div>

          {camErr&&(
            <div style={{marginTop:16}}>
              <p style={{color:T.muted,fontSize:12,marginBottom:10,textAlign:'center'}}>Or upload a recent photo instead:</p>
              <IDZone label="Upload a selfie photo" sublabel="Clear, front-facing, no sunglasses" value={selfie?{dataUrl:selfie,file:{name:'selfie.jpg'}}:null}
                onChange={v=>{if(v){setSelfie(v.dataUrl);setStep(5);}else setSelfie(null);}}/>
            </div>
          )}

          <div style={{marginTop:14,display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
            {[['😊','Face forward','Look straight at camera'],['☀️','Good light','Well-lit, no shadows'],['🕶️','No glasses','Remove if possible']].map(([i,h,d])=>(
              <div key={h} style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:8,padding:'10px',textAlign:'center'}}>
                <div style={{fontSize:18,marginBottom:4}}>{i}</div>
                <div style={{color:T.text,fontSize:11,fontWeight:600}}>{h}</div>
                <div style={{color:T.muted,fontSize:10,marginTop:2}}>{d}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Nav buttons */}
      {step<5&&(
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:28}}>
          <button onClick={back} className="btn-base"
            style={{padding:'10px 18px',background:'none',border:`1px solid ${T.border}`,color:T.muted,borderRadius:7,fontSize:13,visibility:step===0?'hidden':'visible'}}>
            ← Back
          </button>
          {step<4&&(
            <button onClick={next} disabled={!canNext()} className="btn-base"
              style={{padding:'10px 28px',background:canNext()?T.accent:T.bg3,color:canNext()?'#000':T.muted,border:'none',borderRadius:7,fontWeight:700,fontSize:14}}>
              Continue →
            </button>
          )}
          {step===4&&camErr&&selfie&&(
            <button onClick={()=>setStep(5)} className="btn-base"
              style={{padding:'10px 28px',background:T.accent,color:'#000',border:'none',borderRadius:7,fontWeight:700,fontSize:14}}>
              Continue →
            </button>
          )}
        </div>
      )}
    </div>
  );
}

// ─── SIGNATURE PAD MODAL ──────────────────────────────────────────────
function SigPadModal({onSave,onClose}){
  const cvs=useRef(null),last=useRef(null),drag=useRef(false);
  const [tab,setTab]=useState('draw'),[hasPx,setHasPx]=useState(false);
  const [typed,setTyped]=useState(''),[font,setFont]=useState("'Brush Script MT',cursive");
  const clearCvs=useCallback(()=>{const c=cvs.current;if(!c)return;const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);setHasPx(false);},[]);
  useEffect(()=>{if(tab==='draw')setTimeout(clearCvs,0);},[tab]);
  const xy=(e,c)=>{const r=c.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return[(s.clientX-r.left)*(c.width/r.width),(s.clientY-r.top)*(c.height/r.height)];};
  const onS=e=>{e.preventDefault();drag.current=true;last.current=xy(e,cvs.current);};
  const onM=e=>{e.preventDefault();if(!drag.current)return;const c=cvs.current,ctx=c.getContext('2d'),[x,y]=xy(e,c);ctx.beginPath();ctx.moveTo(last.current[0],last.current[1]);ctx.lineTo(x,y);ctx.strokeStyle='#0F172A';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();last.current=[x,y];setHasPx(true);};
  const onE=e=>{e?.preventDefault();drag.current=false;last.current=null;};
  const doSave=()=>{
    if(tab==='draw'){if(!hasPx)return;onSave(cvs.current.toDataURL('image/png'));}
    else{if(!typed.trim())return;const t=document.createElement('canvas');t.width=380;t.height=110;const ctx=t.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,380,110);ctx.fillStyle='#0F172A';ctx.font=`52px ${font}`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(typed,190,58);onSave(t.toDataURL('image/png'));}
  };
  const Tab=({id,label})=><button onClick={()=>setTab(id)} style={{flex:1,padding:'8px 4px',border:'none',cursor:'pointer',borderRadius:6,fontFamily:"'IBM Plex Sans',sans-serif",fontSize:12,fontWeight:500,background:tab===id?T.accent:'transparent',color:tab===id?'#000':T.muted,transition:'all .15s'}}>{label}</button>;
  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-sheet">
        <div style={{display:'flex',justifyContent:'center',padding:'10px 0 4px'}}><div style={{width:36,height:4,borderRadius:2,background:T.border}}/></div>
        <div style={{padding:'4px 20px 24px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
            <h3 style={{fontFamily:"'Playfair Display',serif",color:T.text,fontSize:20}}>Create Signature</h3>
            <button onClick={onClose} className="btn-base" style={{background:'none',color:T.muted,fontSize:24,lineHeight:1,padding:'4px 8px'}}>×</button>
          </div>
          <div style={{display:'flex',gap:4,background:T.bg1,borderRadius:8,padding:4,marginBottom:20}}><Tab id="draw" label="✏️ Draw"/><Tab id="type" label="⌨️ Type"/><Tab id="upload" label="📁 Upload"/></div>
          {tab==='draw'&&<>
            <p style={{color:T.muted,fontSize:12,marginBottom:8}}>Draw with your mouse or finger</p>
            <canvas ref={cvs} width={360} height={160} style={{width:'100%',height:160,border:`1px solid ${T.border}`,borderRadius:8,background:'#fff',display:'block',cursor:'crosshair'}}
              onMouseDown={onS} onMouseMove={onM} onMouseUp={onE} onMouseLeave={onE} onTouchStart={onS} onTouchMove={onM} onTouchEnd={onE}/>
            <button onClick={clearCvs} className="btn-base" style={{marginTop:8,background:'none',border:`1px solid ${T.border}`,color:T.muted,padding:'5px 14px',borderRadius:5,fontSize:12}}>↺ Clear</button>
          </>}
          {tab==='type'&&<>
            <input type="text" value={typed} onChange={e=>setTyped(e.target.value)} placeholder="Your full name…" style={{width:'100%',background:T.bg1,border:`1px solid ${T.border}`,color:T.text,padding:'10px 13px',borderRadius:7,fontSize:15,marginBottom:14,fontFamily:'inherit',outline:'none'}}/>
            <div style={{background:'#fff',borderRadius:8,padding:'12px 14px',minHeight:80,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:14}}>
              <span style={{fontFamily:font,fontSize:42,color:'#0F172A'}}>{typed||<span style={{color:'#cbd5e1',fontFamily:"'IBM Plex Sans',sans-serif",fontSize:14}}>Preview</span>}</span>
            </div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {[["'Brush Script MT',cursive",'Elegant'],["Georgia,serif",'Classic'],["'Palatino Linotype',serif",'Formal'],["'Courier New',monospace",'Print']].map(([f,l])=>(
                <button key={f} onClick={()=>setFont(f)} className="btn-base" style={{padding:'5px 12px',borderRadius:5,fontSize:13,fontFamily:f,background:font===f?T.accent:T.bg3,color:font===f?'#000':T.muted,border:`1px solid ${font===f?T.accent:T.border}`}}>{l}</button>
              ))}
            </div>
          </>}
          {tab==='upload'&&(
            <div style={{border:`2px dashed ${T.border}`,borderRadius:10,padding:'36px 20px',textAlign:'center'}}>
              <div style={{fontSize:40,marginBottom:10}}>🖋️</div>
              <p style={{color:T.muted,fontSize:13,marginBottom:14}}>Upload a PNG or JPG of your signature</p>
              <input type="file" id="sig-up" accept="image/*" style={{display:'none'}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>onSave(ev.target.result);r.readAsDataURL(f);}}/>
              <label htmlFor="sig-up" style={{display:'inline-block',padding:'10px 26px',background:T.accent,color:'#000',borderRadius:7,cursor:'pointer',fontWeight:700,fontSize:14}}>Choose File</label>
            </div>
          )}
          {tab!=='upload'&&(
            <div style={{display:'flex',gap:10,marginTop:22,justifyContent:'flex-end'}}>
              <button onClick={onClose} className="btn-base" style={{padding:'10px 18px',background:'none',border:`1px solid ${T.border}`,color:T.muted,borderRadius:7,fontSize:13}}>Cancel</button>
              <button onClick={doSave} className="btn-base" style={{padding:'10px 24px',background:T.accent,color:'#000',border:'none',borderRadius:7,fontWeight:700,fontSize:14}}>Use Signature →</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── DRAG-SIG ─────────────────────────────────────────────────────────
function DragSig({sig,containerRef,onMove,onDelete}){
  const ref=useRef(null),st=useRef({drag:false,offX:0,offY:0});
  const start=e=>{
    if(e.target.dataset.del)return; e.preventDefault(); st.current.drag=true;
    const s=e.touches?e.touches[0]:e,r=ref.current.getBoundingClientRect();
    st.current.offX=s.clientX-r.left; st.current.offY=s.clientY-r.top;
    const mv=ev=>{if(!st.current.drag)return;ev.preventDefault();const p=ev.touches?ev.touches[0]:ev,pr=containerRef.current.getBoundingClientRect();onMove(sig.id,Math.max(0,Math.min(p.clientX-pr.left-st.current.offX,pr.width-140)),Math.max(0,Math.min(p.clientY-pr.top-st.current.offY,pr.height-50)));};
    const end=()=>{st.current.drag=false;window.removeEventListener('mousemove',mv);window.removeEventListener('touchmove',mv);window.removeEventListener('mouseup',end);window.removeEventListener('touchend',end);};
    window.addEventListener('mousemove',mv,{passive:false}); window.addEventListener('touchmove',mv,{passive:false});
    window.addEventListener('mouseup',end); window.addEventListener('touchend',end);
  };
  return(
    <div ref={ref} onMouseDown={start} onTouchStart={start}
      style={{position:'absolute',left:sig.x,top:sig.y,border:`2px dashed ${T.accent}`,borderRadius:4,padding:2,cursor:'move',userSelect:'none',zIndex:20,touchAction:'none'}}>
      <img src={sig.dataUrl} alt="sig" style={{height:48,display:'block',pointerEvents:'none'}} draggable={false}/>
      <button data-del="1" onClick={()=>onDelete(sig.id)} style={{position:'absolute',top:-11,right:-11,width:22,height:22,background:T.danger,color:'#fff',border:'none',borderRadius:'50%',cursor:'pointer',fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',padding:0}}>×</button>
    </div>

// ─── SIGN VIEW ────────────────────────────────────────────────────────
function SignView({file,identity,onDone,onNotarize}){
  const {canvasRef,ready,err,dims}=useDocRenderer(file);
  const [sigs,setSigs]=useState([]),[showPad,setShowPad]=useState(false);
  const [placing,setPlacing]=useState(false),[pending,setPending]=useState(null),[saving,setSaving]=useState(false);
  const containerRef=useRef(null);
  const saveSig=url=>{setPending(url);setShowPad(false);setPlacing(true);};
  const place=e=>{if(!placing||!pending)return;e.preventDefault();const r=containerRef.current.getBoundingClientRect(),s=e.touches?e.touches[0]:e;setSigs(p=>[...p,{id:Date.now(),dataUrl:pending,x:s.clientX-r.left-70,y:s.clientY-r.top-24}]);setPlacing(false);setPending(null);};
  const moveSig=(id,x,y)=>setSigs(p=>p.map(s=>s.id===id?{...s,x,y}:s));
  const delSig=id=>setSigs(p=>p.filter(s=>s.id!==id));
  const buildP=()=>sigs.map(s=>({dataUrl:s.dataUrl,x:s.x,y:s.y,pageW:dims.w,pageH:dims.h}));
  const handleDone=async()=>{setSaving(true);try{if(file.type==='application/pdf'||file.name?.endsWith('.pdf')){const bytes=await burnSignaturesToPDF(file,buildP());dlBytes(bytes,`signed_${file.name}`);}onDone(sigs,buildP());}catch(e){alert('Error: '+e.message);}setSaving(false);};
  const handleNotarize=async()=>{setSaving(true);try{const p=buildP();let sf=file;if(file.type==='application/pdf'||file.name?.endsWith('.pdf')){const bytes=await burnSignaturesToPDF(file,p);sf=new File([bytes],file.name,{type:'application/pdf'});}onNotarize(sigs,p,sf);}catch(e){alert('Error: '+e.message);}setSaving(false);};
  return(
    <div className="sign-layout" style={{flex:1,overflow:'hidden'}}>
      {showPad&&<SigPadModal onSave={saveSig} onClose={()=>setShowPad(false)}/>}
      {identity&&(
        <div style={{background:`${T.success}0E`,borderBottom:`1px solid ${T.success}28`,padding:'7px 16px',display:'flex',alignItems:'center',gap:8,fontSize:12,flexShrink:0}}>
          <span style={{color:T.success}}>✓</span>
          <span style={{color:T.text,fontWeight:600}}>Identity Verified —</span>
          <span style={{color:T.muted}}>{identity.firstName} {identity.lastName} · {identity.email}</span>
          {identity.selfie&&<img src={identity.selfie} alt="" style={{width:24,height:24,borderRadius:'50%',objectFit:'cover',marginLeft:'auto',border:`1px solid ${T.success}`}}/>}
        </div>
      )}
      <div className="sign-sidebar">
        <button className="btn-base" onClick={()=>setShowPad(true)} style={{padding:'9px 16px',background:T.accent,color:'#000',border:'none',borderRadius:7,fontWeight:700,fontSize:13,whiteSpace:'nowrap'}}>+ Signature</button>
        {sigs.length>0&&<>
          <button className="btn-base" onClick={handleNotarize} disabled={saving} style={{padding:'9px 14px',background:'none',color:T.text,border:`1px solid ${T.border}`,borderRadius:7,fontSize:13,whiteSpace:'nowrap'}}>{saving?'⏳':'🔏 Notarize'}</button>
          <button className="btn-base" onClick={handleDone} disabled={saving} style={{padding:'9px 14px',background:T.success,color:'#fff',border:'none',borderRadius:7,fontSize:13,fontWeight:700,whiteSpace:'nowrap'}}>{saving?'⏳':'✓ Done'}</button>
        </>}
        {placing&&<div style={{background:`${T.accent}18`,border:`1px solid ${T.accent}55`,borderRadius:6,padding:'8px 10px',fontSize:12,color:T.accentHi,fontWeight:600}}>📍 Click to place</div>}
      </div>
      <div className="sign-canvas-area" ref={containerRef} onClick={place} onTouchStart={placing?place:undefined} style={{cursor:placing?'crosshair':'default'}}>
        <div style={{position:'relative',display:'inline-block',boxShadow:'0 12px 64px rgba(0,0,0,.7)'}}>
          {!ready&&!err&&<div style={{width:Math.min(580,window.innerWidth-40),height:700,background:T.bg2,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}}><Spinner size={36}/><span style={{color:T.muted,fontSize:13}}>Rendering document…</span></div>}
          {err&&<div style={{width:340,height:400,background:T.bg2,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8}}><span style={{fontSize:32}}>⚠️</span><span style={{color:T.danger}}>{err}</span></div>}
          <canvas ref={canvasRef} style={{display:ready?'block':'none',maxWidth:'100%'}}/>
          {sigs.map(s=><DragSig key={s.id} sig={s} containerRef={{current:containerRef.current}} onMove={moveSig} onDelete={delSig}/>)}
        </div>
      </div>
    </div>
  );
}

// ─── NOTARIZE VIEW ────────────────────────────────────────────────────
function NotarizeView({file,signedFile,sigs,identity,onComplete,onSkip}){
  const [step,setStep]=useState('form'),[tick,setTick]=useState(0);
  const [notaryInfo,setNotaryInfo]=useState(null),[errMsg,setErrMsg]=useState('');
  const [formData,setFormData]=useState({docType:'oil_and_gas_lease',state:identity?.state||'TX'});
  const ON_KEY='YOUR_ONENOTARY_API_KEY',ON_BASE='https://api.onenotary.us/v1';

  const connect=async()=>{
    setStep('connecting');
    try{
      if(ON_KEY==='YOUR_ONENOTARY_API_KEY') throw new Error('demo');
      const sess=await fetch(`${ON_BASE}/sessions`,{method:'POST',headers:{'Authorization':`Bearer ${ON_KEY}`,'Content-Type':'application/json'},body:JSON.stringify({document_type:formData.docType,signer_name:`${identity?.firstName||''} ${identity?.lastName||''}`.trim(),signer_email:identity?.email||'',document_name:file?.name||'doc.pdf',notary_state:formData.state})}).then(r=>r.json());
      const buf=await(signedFile||file).arrayBuffer();
      const fd=new FormData(); fd.append('document',new Blob([buf],{type:'application/pdf'}),file?.name||'doc.pdf');
      await fetch(`${ON_BASE}/sessions/${sess.session_id}/docs`,{method:'POST',headers:{'Authorization':`Bearer ${ON_KEY}`},body:fd});
      if(sess.redirect_url) window.open(sess.redirect_url,'_blank');

        ].map(([k,v])=>(
          <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:`1px solid ${T.border}`}}>
            <span style={{color:T.muted,fontSize:12,flexShrink:0}}>{k}</span>
            <span style={{color:k.includes('Verified')||k.includes('Biometric')||k==='Status'?T.success:T.text,fontSize:12,fontWeight:500,maxWidth:'62%',textAlign:'right',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{v}</span>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}>
        <button className="btn-base" style={{padding:'11px 22px',background:T.accent,color:'#000',border:'none',borderRadius:8,fontWeight:700,fontSize:14}}>⬇️ Download PDF</button>
        <button className="btn-base" style={{padding:'11px 18px',background:T.bg2,color:T.text,border:`1px solid ${T.border}`,borderRadius:8,fontSize:13}}>📧 Email Copy</button>
        <button onClick={onReset} className="btn-base" style={{padding:'11px 18px',background:'none',color:T.muted,border:`1px solid ${T.border}`,borderRadius:8,fontSize:13}}>+ New Document</button>
      </div>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState('home');
  const [file,setFile]=useState(null);
  const [identity,setIdentity]=useState(null);
  const [sigs,setSigs]=useState([]);
  const [placements,setPlacements]=useState([]);
  const [signedFile,setSignedFile]=useState(null);
  const [notarized,setNotarized]=useState(false);
  const [notaryInfo,setNotaryInfo]=useState(null);
  useEffect(()=>{if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});},[]);
  const reset=()=>{setView('home');setFile(null);setIdentity(null);setSigs([]);setPlacements([]);setSignedFile(null);setNotarized(false);setNotaryInfo(null);};
  return(
    <>
      <NavBar current={view} onHome={reset}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflowY:view==='sign'?'hidden':'auto'}}>
        {view==='home'     &&<HomeView     onStart={()=>setView('upload')}/>}
        {view==='upload'   &&<UploadView   onFile={f=>{setFile(f);setView('verify');}}/>}
        {view==='verify'   &&<VerifyView   onVerified={id=>{setIdentity(id);setView('sign');}}/>}
        {view==='sign'     &&<SignView     file={file} identity={identity} onDone={(s,p)=>{setSigs(s);setPlacements(p);setView('complete');}} onNotarize={(s,p,sf)=>{setSigs(s);setPlacements(p);setSignedFile(sf);setView('notarize');}}/>}
        {view==='notarize' &&<NotarizeView file={file} signedFile={signedFile} sigs={sigs} identity={identity} onComplete={(n,info)=>{setNotarized(n);setNotaryInfo(info);setView('complete');}} onSkip={()=>setView('complete')}/>}
        {view==='complete' &&<CompleteView file={file} sigs={sigs} identity={identity} notarized={notarized} notaryInfo={notaryInfo} onReset={reset}/>}
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
