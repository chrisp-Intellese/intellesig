<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
  <title>IntelleSig — O&G Signing</title>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#C8922A"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="IntelleSig"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overscroll-behavior: none; }
    body { min-height: 100dvh; background: #080A10; color: #DCE5F2; font-family: 'IBM Plex Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100dvh; display: flex; flex-direction: column; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #0C0F16; }
    ::-webkit-scrollbar-thumb { background: #2E3D55; border-radius: 3px; }

    @keyframes fadeUp   { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn   { from{opacity:0} to{opacity:1} }
    @keyframes slideR   { from{transform:translateX(100%)} to{transform:translateX(0)} }
    @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes spin     { to{transform:rotate(360deg)} }
    @keyframes checkPop { 0%{transform:scale(0)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }
    @keyframes scanLine { 0%{top:0%;opacity:1}48%{top:94%;opacity:1}50%{top:94%;opacity:0}52%{top:0%;opacity:0}54%{top:0%;opacity:1}100%{top:0%;opacity:1} }
    @keyframes shimmer  { 0%{background-position:200% center}100%{background-position:-200% center} }

    .fade-up   { animation: fadeUp .3s ease both; }
    .fade-in   { animation: fadeIn .2s ease; }
    .slide-r   { animation: slideR .28s ease; }
    .pulse     { animation: pulse 1.6s ease-in-out infinite; }
    .spin      { animation: spin 1s linear infinite; display:inline-block; }
    .check-pop { animation: checkPop .4s cubic-bezier(.34,1.56,.64,1) both; }

    .btn { transition: transform .1s, filter .12s, opacity .15s; cursor: pointer; border: none; font-family: 'IBM Plex Sans', sans-serif; }
    .btn:hover  { filter: brightness(1.1); }
    .btn:active { transform: scale(.96); }
    .btn:disabled { opacity: .38; cursor: not-allowed; }

    canvas { touch-action: none; display: block; }

    /* ── Modal ── */
    .modal-bg { position:fixed; inset:0; z-index:9000; background:rgba(0,0,0,.82); display:flex; align-items:flex-end; animation:fadeIn .2s; }
    @media(min-width:640px){ .modal-bg { align-items:center; justify-content:center; } }
    .modal-card { width:100%; max-height:92dvh; overflow-y:auto; background:#121720; border-radius:18px 18px 0 0; border:1px solid #222C3E; border-bottom:none; animation:fadeUp .25s ease; }
    @media(min-width:640px){ .modal-card { width:520px; border-radius:14px; border-bottom:1px solid #222C3E; max-height:88dvh; } }

    /* ── Sign layout ── */
    .sign-root { display:flex; flex-direction:column; flex:1; overflow:hidden; min-height:0; }
    .sign-body  { display:flex; flex:1; overflow:hidden; min-height:0; }

    /* ── Toolbar ── */
    .toolbar { background:#0C0F16; border-bottom:1px solid #222C3E; display:flex; align-items:center; gap:6px; padding:8px 12px; overflow-x:auto; flex-shrink:0; }
    @media(min-width:900px){ .toolbar { border-bottom:none; border-right:1px solid #222C3E; flex-direction:column; width:76px; padding:12px 6px; overflow-x:visible; overflow-y:auto; align-items:stretch; } }

    .tool-btn { border:1px solid #222C3E; border-radius:8px; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; padding:7px 5px; min-width:54px; flex-shrink:0; transition:all .15s; font-family:'IBM Plex Sans',sans-serif; }
    @media(min-width:900px){ .tool-btn { min-width:unset; width:100%; padding:9px 4px; } }
    .tool-btn:hover { filter:brightness(1.1); }

    /* ── Canvas area ── */
    .canvas-area { flex:1; overflow:auto; background:#2D3748; display:flex; justify-content:center; align-items:flex-start; padding:24px; min-height:0; position:relative; }

    /* ── Action bar ── */
    .action-bar { background:#0C0F16; border-top:1px solid #222C3E; padding:10px 16px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; flex-shrink:0; }

    /* ── Log drawer ── */
    .log-panel  { position:fixed; inset:0; z-index:8000; background:rgba(0,0,0,.7); animation:fadeIn .2s; }
    .log-drawer { position:absolute; top:0; right:0; bottom:0; width:min(380px,100vw); background:#0C0F16; border-left:1px solid #222C3E; display:flex; flex-direction:column; animation:slideR .28s ease; }

    /* ── ID upload zone ── */
    .id-zone { border:2px dashed #222C3E; border-radius:10px; padding:22px 14px; text-align:center; cursor:pointer; background:#121720; transition:all .2s; position:relative; overflow:hidden; }
    .id-zone:hover,.id-zone.over { border-color:#C8922A; background:rgba(200,146,42,.06); }
    .id-zone.filled { border-color:#16A34A; background:rgba(22,163,74,.06); border-style:solid; }
    .scan-overlay { position:absolute; inset:0; pointer-events:none; }
    .scan-line { position:absolute; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,#C8922A,#E5B04A,#C8922A,transparent); animation:scanLine 2.2s ease-in-out infinite; box-shadow:0 0 10px #C8922A88; }

    /* ── Webcam ── */
    .webcam-wrap { position:relative; border-radius:12px; overflow:hidden; border:2px solid #222C3E; aspect-ratio:4/3; width:100%; max-width:420px; margin:0 auto; background:#06080E; }
    .webcam-wrap video { width:100%; height:100%; object-fit:cover; display:block; transform:scaleX(-1); }
    .face-oval-wrap { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
    .face-oval { width:46%; aspect-ratio:3/4; border:2.5px solid rgba(200,146,42,.8); border-radius:50%; box-shadow:0 0 0 9999px rgba(0,0,0,.45); }

    /* ── Step bar ── */
    .step-bar { display:flex; align-items:center; gap:0; }
    .sdot { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; flex-shrink:0; }
    .slbl { display:none; font-size:10px; margin-left:4px; white-space:nowrap; }
    @media(min-width:540px){ .slbl{ display:inline; } }

    /* ── Forms ── */
    .fl { color:#5C6D84; font-size:10px; display:block; margin-bottom:5px; font-family:'IBM Plex Mono',monospace; letter-spacing:1.2px; text-transform:uppercase; }
    .fi { width:100%; background:#121720; border:1px solid #222C3E; color:#DCE5F2; padding:10px 12px; border-radius:7px; font-size:14px; font-family:'IBM Plex Sans',sans-serif; outline:none; transition:border-color .18s; }
    .fi:focus { border-color:#C8922A; }
    .fi::placeholder { color:#3A4A5C; }
    select.fi { cursor:pointer; }

    /* ── Verified banner ── */
    .verified-banner { background:rgba(22,163,74,.1); border-bottom:1px solid rgba(22,163,74,.25); padding:6px 14px; display:flex; align-items:center; gap:10px; font-size:12px; flex-shrink:0; }

    /* ── Feature grid ── */
    .feat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    @media(min-width:640px){ .feat-grid{ grid-template-columns:repeat(4,1fr); } }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" crossorigin></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

/* ════════════════════════════════════════
   THEME
════════════════════════════════════════ */
const T = {
  bg0:'#080A10',bg1:'#0C0F16',bg2:'#121720',bg3:'#1A2030',bg4:'#212840',
  border:'#222C3E',hi:'#2E3D55',
  accent:'#C8922A',accentHi:'#E5B04A',glow:'rgba(200,146,42,.15)',
  text:'#DCE5F2',muted:'#5C6D84',dim:'#3A4A5C',
  ok:'#16A34A',err:'#DC2626',info:'#2563EB',
};

/* ════════════════════════════════════════
   IDENTITY PERSISTENCE  (90-day session)
════════════════════════════════════════ */
const IDENT_KEY     = 'intellesig_identity_v2';
const SESSION_DAYS  = 90; // ← admin can change this

const IdentityStore = {
  save(identity) {
    const expires = Date.now() + SESSION_DAYS * 24 * 60 * 60 * 1000;
    localStorage.setItem(IDENT_KEY, JSON.stringify({ ...identity, expires, savedAt: Date.now() }));
  },
  load() {
    try {
      const raw = JSON.parse(localStorage.getItem(IDENT_KEY));
      if (!raw) return null;
      if (Date.now() > raw.expires) { localStorage.removeItem(IDENT_KEY); return null; }
      return raw;
    } catch { return null; }
  },
  clear() { localStorage.removeItem(IDENT_KEY); },
  daysLeft() {
    try {
      const raw = JSON.parse(localStorage.getItem(IDENT_KEY));
      if (!raw) return 0;
      return Math.max(0, Math.ceil((raw.expires - Date.now()) / 86400000));
    } catch { return 0; }
  },
};

/* ════════════════════════════════════════
   DOCUMENT LOG
════════════════════════════════════════ */
const DocStore = {
  KEY: 'intellesig_log_v3',
  all()  { try { return JSON.parse(localStorage.getItem(this.KEY)||'[]'); } catch { return []; } },
  add(d) { const a=this.all(); a.unshift({...d,id:Date.now().toString(),date:new Date().toISOString()}); localStorage.setItem(this.KEY,JSON.stringify(a.slice(0,300))); },
  clear(){ localStorage.removeItem(this.KEY); },
};

/* ════════════════════════════════════════
   PDF BURN
════════════════════════════════════════ */
async function burnToPDF(file, fields, cW, cH) {
  const { PDFDocument, rgb, StandardFonts } = PDFLib;
  const doc  = await PDFDocument.load(await file.arrayBuffer());
  const page = doc.getPages()[0];
  const { width:pW, height:pH } = page.getSize();
  const font = await doc.embedFont(StandardFonts.Helvetica);
  const sx=pW/cW, sy=pH/cH;

  for (const f of fields) {
    const px=f.x*sx, py=pH-(f.y*sy)-(f.h*sy), pw=f.w*sx, ph=f.h*sy;
    if ((f.type==='sig'||f.type==='initials') && f.value) {
      const b64=f.value.replace(/^data:image\/\w+;base64,/,'');
      const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
      let img; try{img=await doc.embedPng(bytes);}catch{img=await doc.embedJpg(bytes);}
      page.drawImage(img,{x:px,y:py,width:pw,height:ph});
    } else if (f.type==='text' && f.value?.trim()) {
      const fs=Math.min(12,Math.max(7,ph*0.55))*sx;
      f.value.split('\n').forEach((ln,i)=>page.drawText(ln,{x:px+2,y:py+ph-(i+1)*(fs+2),size:fs,font,color:rgb(.05,.05,.05),maxWidth:pw-4}));
    } else if (f.type==='date') {
      const d=f.value?new Date(f.value).toLocaleDateString('en-US'):new Date().toLocaleDateString('en-US');
      page.drawText(d,{x:px+3,y:py+ph*.3,size:Math.min(11*sx,ph*.55),font,color:rgb(.05,.05,.05)});
    } else if (f.type==='checkbox') {
      page.drawRectangle({x:px,y:py,width:pw,height:ph,borderWidth:1,borderColor:rgb(.4,.4,.4),color:rgb(1,1,1)});
      if(f.checked){page.drawLine({start:{x:px+2,y:py+ph/2},end:{x:px+pw*.4,y:py+2},thickness:1.5,color:rgb(.05,.05,.05)});page.drawLine({start:{x:px+pw*.4,y:py+2},end:{x:px+pw-2,y:py+ph-3},thickness:1.5,color:rgb(.05,.05,.05)});}
    }
  }
  return doc.save();
}

function dlBytes(bytes, name) {
  const url=URL.createObjectURL(new Blob([bytes],{type:'application/pdf'}));
  const a=document.createElement('a'); a.href=url; a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),2000);
}

/* ════════════════════════════════════════
   FIELD CONFIG
════════════════════════════════════════ */
const FC = {
  sig:      {label:'Signature', icon:'✍️', color:'#2563EB', bg:'rgba(37,99,235,.08)',   dW:190,dH:64,  minW:80, minH:30},
  initials: {label:'Initials',  icon:'AB', color:'#0891B2', bg:'rgba(8,145,178,.08)',   dW:80, dH:48,  minW:40, minH:24},
  text:     {label:'Text',      icon:'T',  color:'#D97706', bg:'rgba(217,119,6,.08)',    dW:200,dH:38,  minW:80, minH:24},
  date:     {label:'Date',      icon:'📅', color:'#7C3AED', bg:'rgba(124,58,237,.08)',   dW:155,dH:38,  minW:100,minH:24},
  checkbox: {label:'Check',     icon:'☑', color:'#6B7280', bg:'rgba(107,114,128,.08)',  dW:28, dH:28,  minW:16, minH:16},
};

const HANDLES=['nw','n','ne','e','se','s','sw','w'];
const HCUR={nw:'nw-resize',n:'ns-resize',ne:'ne-resize',e:'ew-resize',se:'se-resize',s:'ns-resize',sw:'sw-resize',w:'ew-resize'};
const HPOS={nw:{top:-5,left:-5},n:{top:-5,left:'calc(50% - 5px)'},ne:{top:-5,right:-5},e:{top:'calc(50% - 5px)',right:-5},se:{bottom:-5,right:-5},s:{bottom:-5,left:'calc(50% - 5px)'},sw:{bottom:-5,left:-5},w:{top:'calc(50% - 5px)',left:-5}};

function isFilled(f) {
  if(f.type==='sig'||f.type==='initials') return !!f.value;
  if(f.type==='text') return !!(f.value?.trim());
  if(f.type==='date') return !!f.value;
  return true;
}

/* ════════════════════════════════════════
   HOOKS
════════════════════════════════════════ */
function useDocRenderer(file) {
  const cvs=useRef(null);
  const [ready,setReady]=useState(false);
  const [err,setErr]=useState(null);
  const [dims,setDims]=useState({w:0,h:0});
  useEffect(()=>{
    if(!file)return; setReady(false); setErr(null);
    if(file.type.startsWith('image/')){
      const url=URL.createObjectURL(file),img=new Image();
      img.onload=()=>{const c=cvs.current;if(!c)return;c.width=img.naturalWidth;c.height=img.naturalHeight;c.getContext('2d').drawImage(img,0,0);setDims({w:img.naturalWidth,h:img.naturalHeight});setReady(true);URL.revokeObjectURL(url);};
      img.onerror=()=>setErr('Failed to load image'); img.src=url;
      return()=>URL.revokeObjectURL(url);
    }
    (async()=>{try{
      pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const pdf=await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
      const pg=await pdf.getPage(1),vp=pg.getViewport({scale:window.devicePixelRatio>=2?1.3:1.6});
      const c=cvs.current;if(!c)return;c.width=vp.width;c.height=vp.height;
      await pg.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
      setDims({w:vp.width,h:vp.height});setReady(true);
    }catch(e){setErr(e.message);}})();
  },[file]);
  return {canvasRef:cvs,ready,err,dims};
}

/* ════════════════════════════════════════
   SMALL SHARED COMPONENTS
════════════════════════════════════════ */
function Spinner({size=28,color=T.accent}){
  return <div className="spin" style={{width:size,height:size,border:`3px solid ${T.border}`,borderTopColor:color,borderRadius:'50%'}}/>;
}

function Pill({color,bg,children}){
  return <span style={{background:bg||color+'22',color,fontSize:10,padding:'2px 8px',borderRadius:4,fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,whiteSpace:'nowrap'}}>{children}</span>;
}

/* ════════════════════════════════════════
   STEP BAR + NAV
════════════════════════════════════════ */
function StepBar({current}){
  const steps=[['upload','Upload'],['sign','Sign'],['notarize','Notarize'],['done','Done']];
  const ci=steps.findIndex(([k])=>k===current);
  return(
    <div className="step-bar">
      {steps.map(([k,lbl],i)=>(
        <React.Fragment key={k}>
          <div style={{display:'flex',alignItems:'center'}}>
            <div className="sdot" style={{background:i<ci?T.ok:i===ci?T.accent:T.bg3,color:i<ci?'#fff':i===ci?'#000':T.muted,border:i===ci?`2px solid ${T.accentHi}`:'none'}}>
              {i<ci?'✓':i+1}
            </div>
            <span className="slbl" style={{color:i===ci?T.text:T.muted}}>{lbl}</span>
          </div>
          {i<steps.length-1&&<div style={{width:14,height:1,background:i<ci?T.ok:T.border,margin:'0 3px'}}/>}
        </React.Fragment>
      ))}
    </div>
  );
}

function NavBar({current,identity,onHome,onLog,logCount,onSwitchUser}){
  return(
    <div style={{height:54,background:T.bg1,borderBottom:`1px solid ${T.border}`,display:'flex',alignItems:'center',gap:10,padding:'0 14px',position:'sticky',top:0,zIndex:300,flexShrink:0}}>
      {/* Logo */}
      <div onClick={onHome} style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',flexShrink:0}}>
        <div style={{width:32,height:32,borderRadius:8,background:T.glow,border:`1px solid ${T.accent}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:17}}>⛽</div>
        <div style={{lineHeight:1}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:14,color:T.text,fontWeight:700}}>IntelleSig</div>
          <div style={{fontSize:8,color:T.muted,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:'1px'}}>O&G PLATFORM</div>
        </div>
      </div>

      {/* Identity chip — shows when verified */}
      {identity&&(
        <div style={{display:'flex',alignItems:'center',gap:7,background:T.bg2,border:`1px solid ${T.ok}40`,borderRadius:20,padding:'3px 10px 3px 6px',flexShrink:0}}>
          {identity.selfie
            ? <img src={identity.selfie} alt="" style={{width:22,height:22,borderRadius:'50%',objectFit:'cover',border:`1.5px solid ${T.ok}`}}/>
            : <div style={{width:22,height:22,borderRadius:'50%',background:T.ok,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12}}>✓</div>}
          <span style={{color:T.text,fontSize:12,fontWeight:600}}>{identity.firstName} {identity.lastName}</span>
          <button onClick={onSwitchUser} title="Switch / re-verify" style={{background:'none',border:'none',color:T.muted,fontSize:14,cursor:'pointer',lineHeight:1,padding:'0 0 0 2px'}}>⟳</button>
        </div>
      )}

      <div style={{flex:1}}/>
      {current!=='home'&&<StepBar current={current}/>}
      <div style={{flex:1}}/>

      {/* Log button */}
      <button onClick={onLog} className="btn" style={{position:'relative',background:T.bg2,border:`1px solid ${T.border}`,borderRadius:7,padding:'6px 10px',color:T.text,fontSize:12,display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
        <span>📋</span>
        {logCount>0&&<span style={{position:'absolute',top:-5,right:-5,width:16,height:16,background:T.accent,color:'#000',borderRadius:'50%',fontSize:8,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>{logCount>9?'9+':logCount}</span>}
      </button>
    </div>
  );
}

/* ════════════════════════════════════════
   DOC LOG PANEL
════════════════════════════════════════ */
function LogPanel({onClose}){
  const [docs,setDocs]=useState(()=>DocStore.all());
  const statusColors={signed:{c:T.ok,l:'Signed'},notarized:{c:T.accent,l:'Notarized'},draft:{c:T.muted,l:'Draft'}};
  return(
    <div className="log-panel" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="log-drawer">
        <div style={{padding:'16px 18px',borderBottom:`1px solid ${T.border}`,display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
          <div>
            <h3 style={{fontFamily:"'Playfair Display',serif",color:T.text,fontSize:18}}>Document Log</h3>
            <p style={{color:T.muted,fontSize:11,marginTop:2}}>{docs.length} document{docs.length!==1?'s':''} · stored locally</p>
          </div>
          <button onClick={onClose} className="btn" style={{background:'none',color:T.muted,fontSize:22,padding:'4px 8px'}}>×</button>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'12px 14px'}}>
          {docs.length===0
            ? <div style={{textAlign:'center',padding:'48px 20px',color:T.muted}}><div style={{fontSize:36,marginBottom:10}}>📄</div><div style={{fontSize:13}}>No documents yet</div></div>
            : docs.map(d=>{
                const sc=statusColors[d.status]||statusColors.draft;
                return(
                  <div key={d.id} style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:10,padding:'13px',marginBottom:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:5}}>
                      <div style={{color:T.text,fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'72%'}}>{d.name}</div>
                      <Pill color={sc.c}>{sc.l}</Pill>
                    </div>
                    <div style={{color:T.muted,fontSize:11,marginBottom:5}}>{new Date(d.date).toLocaleString()}</div>
                    <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
                      {d.signer&&<span style={{color:T.muted,fontSize:11}}>👤 {d.signer}</span>}
                      {d.fields>0&&<span style={{color:T.muted,fontSize:11}}>📋 {d.fields} fields</span>}
                      {d.size&&<span style={{color:T.muted,fontSize:11}}>💾 {d.size}</span>}
                      {d.notary&&<span style={{color:T.accentHi,fontSize:11}}>🔏 {d.notary}</span>}
                    </div>
                  </div>
                );
              })
          }
        </div>
        {docs.length>0&&(
          <div style={{padding:'12px 14px',borderTop:`1px solid ${T.border}`}}>
            <button onClick={()=>{DocStore.clear();setDocs([]);}} className="btn" style={{width:'100%',padding:'8px',background:'none',border:`1px solid ${T.border}`,color:T.muted,borderRadius:6,fontSize:12}}>🗑 Clear All</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   SIGNATURE PAD MODAL  (high-res, full-featured)
════════════════════════════════════════ */
function SigModal({mode='sig',onSave,onClose}){
  const cvs=useRef(null),last=useRef(null),drag=useRef(false);
  const [tab,setTab]=useState('draw'),[hasPx,setHasPx]=useState(false);
  const [typed,setTyped]=useState(''),[font,setFont]=useState("'Brush Script MT',cursive");
  const [penSize,setPenSize]=useState(2.5),[penColor,setPenColor]=useState('#0F172A');
  const isInit=mode==='initials';

  const DPR=window.devicePixelRatio||1;
  const CVW=isInit?280:440,CVH=isInit?120:180;

  const clearCvs=useCallback(()=>{
    const c=cvs.current;if(!c)return;
    const ctx=c.getContext('2d');
    ctx.setTransform(DPR,0,0,DPR,0,0);
    ctx.fillStyle='#ffffff';ctx.fillRect(0,0,CVW,CVH);
    setHasPx(false);
  },[DPR,CVW,CVH]);

  useEffect(()=>{ if(tab==='draw')setTimeout(clearCvs,0); },[tab,clearCvs]);

  // HiDPI canvas setup
  useEffect(()=>{
    if(tab!=='draw')return;
    const c=cvs.current;if(!c)return;
    c.width=CVW*DPR; c.height=CVH*DPR;
    c.style.width=CVW+'px'; c.style.height=CVH+'px';
    const ctx=c.getContext('2d');
    ctx.setTransform(DPR,0,0,DPR,0,0);
    ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,CVW,CVH);
  },[tab,CVW,CVH,DPR]);

  const getXY=(e,c)=>{
    const r=c.getBoundingClientRect(),s=e.touches?e.touches[0]:e;
    return[(s.clientX-r.left),(s.clientY-r.top)];
  };
  const onS=e=>{e.preventDefault();drag.current=true;last.current=getXY(e,cvs.current);};
  const onM=e=>{
    e.preventDefault();if(!drag.current)return;
    const c=cvs.current,ctx=c.getContext('2d'),[x,y]=getXY(e,c);
    ctx.setTransform(DPR,0,0,DPR,0,0);
    ctx.beginPath();ctx.moveTo(last.current[0],last.current[1]);ctx.lineTo(x,y);
    ctx.strokeStyle=penColor;ctx.lineWidth=penSize;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.stroke();last.current=[x,y];setHasPx(true);
  };
  const onE=e=>{e?.preventDefault();drag.current=false;last.current=null;};

  const doSave=()=>{
    if(tab==='draw'){
      if(!hasPx)return;
      // Export at full DPR resolution
      onSave(cvs.current.toDataURL('image/png'));
    } else if(tab==='type'){
      if(!typed.trim())return;
      const tc=document.createElement('canvas');
      tc.width=isInit?320:480;tc.height=isInit?120:130;
      const ctx=tc.getContext('2d');
      ctx.fillStyle='#fff';ctx.fillRect(0,0,tc.width,tc.height);
      ctx.fillStyle=penColor;ctx.font=`${isInit?60:66}px ${font}`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(typed,tc.width/2,tc.height/2);
      onSave(tc.toDataURL('image/png'));
    }
  };

  const Tab=({id,lbl})=><button className="btn" onClick={()=>setTab(id)} style={{flex:1,padding:'7px',border:'none',borderRadius:6,fontSize:12,fontWeight:500,background:tab===id?T.accent:'transparent',color:tab===id?'#000':T.muted}}>{lbl}</button>;

  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-card">
        <div style={{display:'flex',justifyContent:'center',padding:'10px 0 4px'}}><div style={{width:36,height:4,borderRadius:2,background:T.border}}/></div>
        <div style={{padding:'4px 20px 24px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <h3 style={{fontFamily:"'Playfair Display',serif",color:T.text,fontSize:20}}>{isInit?'Create Initials':'Create Signature'}</h3>
            <button onClick={onClose} className="btn" style={{background:'none',color:T.muted,fontSize:24,padding:'4px 8px'}}>×</button>
          </div>

          {/* Tabs */}
          <div style={{display:'flex',gap:4,background:T.bg1,borderRadius:8,padding:4,marginBottom:16}}>
            <Tab id="draw" lbl="✏️ Draw"/>
            <Tab id="type" lbl="⌨️ Type"/>
            <Tab id="upload" lbl="📁 Upload"/>
          </div>

          {/* Draw */}
          {tab==='draw'&&<>
            {/* Controls */}
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8,flexWrap:'wrap'}}>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <label style={{color:T.muted,fontSize:11}}>Pen size</label>
                <input type="range" min="1" max="6" step=".5" value={penSize} onChange={e=>setPenSize(+e.target.value)}
                  style={{width:80,accentColor:T.accent}}/>
                <span style={{color:T.muted,fontSize:11,minWidth:16}}>{penSize}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <label style={{color:T.muted,fontSize:11}}>Color</label>
                {['#0F172A','#1e40af','#16a34a','#7c3aed'].map(c=>(
                  <div key={c} onClick={()=>setPenColor(c)} style={{width:20,height:20,borderRadius:'50%',background:c,cursor:'pointer',border:`2px solid ${penColor===c?T.accentHi:'transparent'}`,transition:'border .15s'}}/>
                ))}
              </div>
              <button onClick={clearCvs} className="btn" style={{marginLeft:'auto',background:'none',border:`1px solid ${T.border}`,color:T.muted,padding:'4px 12px',borderRadius:5,fontSize:12}}>↺ Clear</button>
            </div>

            {/* Canvas */}
            <div style={{border:`2px solid ${T.border}`,borderRadius:10,overflow:'hidden',background:'#fff',cursor:'crosshair',userSelect:'none'}}>
              <canvas ref={cvs}
                style={{display:'block',maxWidth:'100%',touchAction:'none'}}
                onMouseDown={onS} onMouseMove={onM} onMouseUp={onE} onMouseLeave={onE}
                onTouchStart={onS} onTouchMove={onM} onTouchEnd={onE}
              />
            </div>
            {!hasPx&&<p style={{color:T.muted,fontSize:11,textAlign:'center',marginTop:8}}>Draw your {isInit?'initials':'signature'} in the box above</p>}
          </>}

          {/* Type */}
          {tab==='type'&&<>
            <input className="fi" type="text" value={typed} onChange={e=>setTyped(e.target.value)} placeholder={isInit?"Your initials (e.g. C.P.)":"Your full legal name"} style={{marginBottom:12}}/>
            <div style={{background:'#fff',borderRadius:10,padding:'12px 16px',minHeight:isInit?80:100,display:'flex',alignItems:'center',justifyContent:'center',border:`1px solid ${T.border}`,marginBottom:12}}>
              <span style={{fontFamily:font,fontSize:isInit?44:52,color:penColor}}>
                {typed||<span style={{color:'#cbd5e1',fontFamily:"'IBM Plex Sans',sans-serif",fontSize:14}}>Preview here</span>}
              </span>
            </div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}}>
              {[["'Brush Script MT',cursive",'Elegant'],["Georgia,serif",'Classic'],["'Palatino Linotype',serif",'Formal'],["'Courier New',monospace",'Print']].map(([f,l])=>(
                <button key={f} onClick={()=>setFont(f)} className="btn" style={{padding:'5px 12px',borderRadius:5,fontSize:12,fontFamily:f,background:font===f?T.accent:T.bg3,color:font===f?'#000':T.muted,border:`1px solid ${font===f?T.accent:T.border}`}}>{l}</button>
              ))}
            </div>
          </>}

          {/* Upload */}
          {tab==='upload'&&(
            <div style={{border:`2px dashed ${T.border}`,borderRadius:10,padding:'36px 20px',textAlign:'center'}}>
              <div style={{fontSize:38,marginBottom:10}}>{isInit?'AB':'🖋️'}</div>
              <p style={{color:T.muted,fontSize:13,marginBottom:14}}>Upload a PNG or JPG of your {isInit?'initials':'signature'}</p>
              <input type="file" id="sig-up" accept="image/*" style={{display:'none'}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>onSave(ev.target.result);r.readAsDataURL(f);}}/>
              <label htmlFor="sig-up" style={{display:'inline-block',padding:'9px 24px',background:T.accent,color:'#000',borderRadius:7,cursor:'pointer',fontWeight:700,fontSize:14}}>Choose File</label>
            </div>
          )}

          {tab!=='upload'&&(
            <div style={{display:'flex',gap:10,marginTop:18,justifyContent:'flex-end'}}>
              <button onClick={onClose} className="btn" style={{padding:'9px 18px',background:'none',border:`1px solid ${T.border}`,color:T.muted,borderRadius:7,fontSize:13}}>Cancel</button>
              <button onClick={doSave} className="btn" style={{padding:'9px 22px',background:T.accent,color:'#000',border:'none',borderRadius:7,fontWeight:700,fontSize:14}}>
                Use {isInit?'Initials':'Signature'} →
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   PLACED FIELD  (drag + 8-handle resize + inline edit)
════════════════════════════════════════ */
function PlacedField({field,selected,onSelect,onUpdate,onDelete,onOpenSig,wrapRef}){
  const cfg=FC[field.type];
  const filled=isFilled(field);
  const showReq=field.required&&!filled;
  const borderC=showReq?T.err:selected?cfg.color:`${cfg.color}55`;

  const startDrag=(e,mode)=>{
    if(e.target.dataset.del||e.target.dataset.req) return;
    if(mode==='move'&&!selected){ e.preventDefault(); e.stopPropagation(); onSelect(field.id); return; }
    e.preventDefault(); e.stopPropagation();
    const s=e.touches?e.touches[0]:e;
    const st={sx:s.clientX,sy:s.clientY,ox:field.x,oy:field.y,ow:field.w,oh:field.h};

    const onMove=ev=>{
      ev.preventDefault();
      const mv=ev.touches?ev.touches[0]:ev;
      const dx=mv.clientX-st.sx, dy=mv.clientY-st.sy;
      let nx=st.ox,ny=st.oy,nw=st.ow,nh=st.oh;
      if(mode==='move'){nx=Math.max(0,st.ox+dx);ny=Math.max(0,st.oy+dy);}
      else{
        if(mode.includes('e')) nw=Math.max(cfg.minW,st.ow+dx);
        if(mode.includes('s')) nh=Math.max(cfg.minH,st.oh+dy);
        if(mode.includes('w')){ nw=Math.max(cfg.minW,st.ow-dx); nx=st.ox+st.ow-nw; }
        if(mode.includes('n')){ nh=Math.max(cfg.minH,st.oh-dy); ny=st.oy+st.oh-nh; }
      }
      onUpdate(field.id,{x:nx,y:ny,w:nw,h:nh});
    };
    const onEnd=()=>{
      window.removeEventListener('mousemove',onMove);window.removeEventListener('touchmove',onMove);
      window.removeEventListener('mouseup',onEnd);window.removeEventListener('touchend',onEnd);
    };
    window.addEventListener('mousemove',onMove,{passive:false}); window.addEventListener('touchmove',onMove,{passive:false});
    window.addEventListener('mouseup',onEnd); window.addEventListener('touchend',onEnd);
  };

  const today=new Date().toISOString().split('T')[0];

  return(
    <div style={{position:'absolute',left:field.x,top:field.y,width:field.w,height:field.h,
      border:`${selected||showReq?2:1.5}px solid ${borderC}`,borderRadius:field.type==='checkbox'?3:6,
      background:showReq?'rgba(220,38,38,.06)':cfg.bg,boxSizing:'border-box',
      cursor:selected?'move':'pointer',userSelect:'none',zIndex:selected?40:10,touchAction:'none'}}
      onMouseDown={e=>startDrag(e,'move')} onTouchStart={e=>startDrag(e,'move')}>

      {/* Required label */}
      {showReq&&<div style={{position:'absolute',top:-11,left:0,background:T.err,color:'#fff',fontSize:8,padding:'1px 5px',borderRadius:3,fontFamily:"'IBM Plex Mono',monospace",whiteSpace:'nowrap',zIndex:50}}>REQUIRED</div>}

      {/* Type label when selected */}
      {selected&&<div style={{position:'absolute',top:-16,left:0,color:cfg.color,fontSize:9,fontFamily:"'IBM Plex Mono',monospace",textTransform:'uppercase',letterSpacing:'.5px',whiteSpace:'nowrap'}}>{cfg.label}</div>}

      {/* ── FIELD CONTENT ── */}
      {(field.type==='sig'||field.type==='initials')&&(
        field.value
          ? <div style={{position:'relative',width:'100%',height:'100%'}}>
              <img src={field.value} alt="" style={{width:'100%',height:'100%',objectFit:'contain',pointerEvents:'none',display:'block'}} draggable={false}/>
              {selected&&<button data-del="1" onMouseDown={e=>{e.stopPropagation();e.preventDefault();onUpdate(field.id,{value:''});}} style={{position:'absolute',bottom:2,right:2,background:T.info,color:'#fff',border:'none',borderRadius:4,fontSize:10,padding:'2px 6px',cursor:'pointer'}}>✏️ Redo</button>}
            </div>
          : <div onClick={e=>{e.stopPropagation();onOpenSig(field.id,field.type);}}
              onTouchEnd={e=>{e.stopPropagation();e.preventDefault();onOpenSig(field.id,field.type);}}
              style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',cursor:'pointer',gap:3}}>
              <span style={{fontSize:Math.min(24,field.h*.55),lineHeight:1}}>{field.type==='initials'?'AB':'✍️'}</span>
              <span style={{fontSize:10,color:cfg.color,fontWeight:600}}>Tap to {field.type==='initials'?'initial':'sign'}</span>
            </div>
      )}

      {field.type==='text'&&(
        <textarea value={field.value||''} onChange={e=>onUpdate(field.id,{value:e.target.value})}
          placeholder="Type here…"
          onMouseDown={e=>e.stopPropagation()} onTouchStart={e=>e.stopPropagation()}
          style={{width:'100%',height:'100%',padding:'4px 6px',background:'transparent',border:'none',outline:'none',color:'#111827',fontSize:Math.max(10,Math.min(13,field.h*.38)),resize:'none',fontFamily:"'IBM Plex Sans',sans-serif",cursor:'text',lineHeight:1.4}}
        />
      )}

      {field.type==='date'&&(
        <input type="date" value={field.value||today} onChange={e=>onUpdate(field.id,{value:e.target.value})}
          onMouseDown={e=>e.stopPropagation()} onTouchStart={e=>e.stopPropagation()}
          style={{width:'100%',height:'100%',padding:'4px 6px',background:'transparent',border:'none',outline:'none',color:'#111827',fontSize:Math.max(9,Math.min(12,field.h*.38)),fontFamily:"'IBM Plex Sans',sans-serif",cursor:'pointer'}}
        />
      )}

      {field.type==='checkbox'&&(
        <div onMouseDown={e=>{e.stopPropagation();onUpdate(field.id,{checked:!field.checked});}}
          onTouchEnd={e=>{e.stopPropagation();e.preventDefault();onUpdate(field.id,{checked:!field.checked});}}
          style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:Math.min(field.w,field.h)*.8,lineHeight:1}}>
          <span style={{color:field.checked?cfg.color:'#9CA3AF'}}>{field.checked?'☑':'☐'}</span>
        </div>
      )}

      {/* ── Selected controls ── */}
      {selected&&<>
        {/* Delete */}
        <button data-del="1" onMouseDown={e=>{e.stopPropagation();e.preventDefault();onDelete(field.id);}}
          onTouchEnd={e=>{e.stopPropagation();e.preventDefault();onDelete(field.id);}}
          style={{position:'absolute',top:-12,right:-12,width:22,height:22,background:T.err,color:'#fff',border:'2px solid #fff',borderRadius:'50%',cursor:'pointer',fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',padding:0,zIndex:60}}>×</button>

        {/* Required toggle */}
        <button data-req="1" onMouseDown={e=>{e.stopPropagation();e.preventDefault();onUpdate(field.id,{required:!field.required});}}
          style={{position:'absolute',bottom:-18,left:0,background:field.required?T.err:T.bg3,color:field.required?'#fff':T.muted,border:`1px solid ${field.required?T.err:T.border}`,borderRadius:3,padding:'2px 5px',fontSize:8,cursor:'pointer',fontFamily:"'IBM Plex Mono',monospace",whiteSpace:'nowrap',zIndex:60}}>
          {field.required?'★ Required':'☆ Optional'}
        </button>

        {/* Resize handles */}
        {HANDLES.map(h=>(
          <div key={h} style={{position:'absolute',...HPOS[h],width:10,height:10,background:'#fff',border:`2px solid ${cfg.color}`,borderRadius:2,cursor:HCUR[h],zIndex:55}}
            onMouseDown={e=>startDrag(e,h)} onTouchStart={e=>startDrag(e,h)}
          />
        ))}
      </>}
    </div>
  );
}

/* ════════════════════════════════════════
   SIGN VIEW
════════════════════════════════════════ */
function SignView({file,identity,onDone,onNotarize}){
  const {canvasRef,ready,err,dims}=useDocRenderer(file);
  const [fields,setFields]=useState([]);
  const [selId,setSelId]=useState(null);
  const [activeTool,setActiveTool]=useState(null);
  const [sigModal,setSigModal]=useState(null);
  const [saving,setSaving]=useState(false);
  const [validErr,setValidErr]=useState('');
  const wrapRef=useRef(null);

  // ESC to deselect / cancel tool
  useEffect(()=>{
    const h=e=>{ if(e.key==='Escape'){setSelId(null);setActiveTool(null);} };
    window.addEventListener('keydown',h); return()=>window.removeEventListener('keydown',h);
  },[]);

  const placeField=e=>{
    if(!activeTool)return;
    e.preventDefault(); e.stopPropagation();
    const r=wrapRef.current.getBoundingClientRect();
    const s=e.touches?e.touches[0]:e;
    const x=s.clientX-r.left, y=s.clientY-r.top;
    const cfg=FC[activeTool];
    const today=new Date().toISOString().split('T')[0];
    const nf={id:Date.now(),type:activeTool,x:Math.max(0,x-cfg.dW/2),y:Math.max(0,y-cfg.dH/2),w:cfg.dW,h:cfg.dH,value:activeTool==='date'?today:'',required:false,checked:false};
    setFields(p=>[...p,nf]);
    setSelId(nf.id);
  };

  const updateField=(id,patch)=>setFields(p=>p.map(f=>f.id===id?{...f,...patch}:f));
  const deleteField=id=>{setFields(p=>p.filter(f=>f.id!==id));if(selId===id)setSelId(null);};
  const openSig=(fid,mode)=>setSigModal({fid,mode});
  const saveSig=url=>{if(sigModal){updateField(sigModal.fid,{value:url});setSigModal(null);}};

  const validate=()=>{
    const bad=fields.filter(f=>f.required&&!isFilled(f));
    if(bad.length){setValidErr(`${bad.length} required field${bad.length>1?'s':''} unfilled`);return false;}
    setValidErr(''); return true;
  };

  const buildForBurn=()=>fields.map(f=>({...f,pageW:dims.w,pageH:dims.h}));

  const handleDone=async()=>{
    if(!validate())return;
    setSaving(true);
    try{
      if(file.name?.endsWith('.pdf')||file.type==='application/pdf'){
        const bytes=await burnToPDF(file,buildForBurn(),dims.w,dims.h);
        dlBytes(bytes,`signed_${file.name}`);
      }
      onDone(fields,dims);
    }catch(e){alert('Error: '+e.message);}
    setSaving(false);
  };

  const handleNotarize=async()=>{
    if(!validate())return;
    setSaving(true);
    try{
      let sf=file;
      if(file.name?.endsWith('.pdf')||file.type==='application/pdf'){
        const bytes=await burnToPDF(file,buildForBurn(),dims.w,dims.h);
        sf=new File([bytes],file.name,{type:'application/pdf'});
      }
      onNotarize(fields,dims,sf);
    }catch(e){alert('Error: '+e.message);}
    setSaving(false);
  };

  const filled=fields.filter(isFilled).length;
  const req=fields.filter(f=>f.required).length;

  return(
    <div className="sign-root">

      {/* Toolbar */}
      <FieldToolbar active={activeTool} onSelect={t=>{setActiveTool(t);setSelId(null);}}/>

      {/* Body */}
      <div className="sign-body" onClick={()=>{if(!activeTool)setSelId(null);}}>
        <div className="canvas-area" ref={wrapRef}
          onClick={activeTool?placeField:undefined}
          onTouchStart={activeTool?placeField:undefined}
          style={{cursor:activeTool?`crosshair`:'default'}}>
          <div style={{position:'relative',display:'inline-block',boxShadow:'0 8px 48px rgba(0,0,0,.65)',userSelect:'none',flexShrink:0}}>
            {!ready&&!err&&(
              <div style={{width:Math.min(640,window.innerWidth-48),height:800,background:T.bg2,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14}}>

            {err&&(
              <div style={{width:380,height:400,background:T.bg2,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8}}>

            {fields.map(f=>(
              <PlacedField key={f.id} field={f} selected={selId===f.id}

                onUpdate={updateField} onDelete={deleteField}
                onOpenSig={openSig} wrapRef={wrapRef}/>
            ))}
          </div>
        </div>

      {/* Action bar */}
      <div className="action-bar">
        <div style={{flex:1,display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
          <span style={{color:T.muted,fontSize:12}}>

              ? 'Select a field type above, then click the document to place it'
              : `${filled}/${fields.length} filled${req>0?` · ${req} required`:''}`}
          </span>
          {validErr&&<span style={{color:T.err,fontSize:12,fontWeight:600}}>⚠ {validErr}</span>}
        </div>
        <div style={{display:'flex',gap:8,flexShrink:0}}>
          <button onClick={handleNotarize} disabled={saving||fields.length===0} className="btn"
            style={{padding:'9px 16px',background:'none',border:`1px solid ${T.border}`,color:T.text,borderRadius:7,fontSize:13}}>
            {saving?'⏳':'🔏 Notarize'}
          </button>
          <button onClick={handleDone} disabled={saving||fields.length===0} className="btn"
            style={{padding:'9px 18px',background:fields.length>0?T.ok:T.bg3,color:fields.length>0?'#fff':T.muted,border:'none',borderRadius:7,fontSize:13,fontWeight:700}}>
            {saving?'⏳':'✓ Complete & Download'}
          </button>
        </div>
      </div>
    </div>
  );
}

        </div>
        <div style={{padding:'14px 18px 18px',display:'flex',gap:8,flexWrap:'wrap'}}>
          {['🎙 Mute','📷 Camera','💬 Chat'].map(l=><button key={l} style={{flex:1,minWidth:60,padding:8,background:T.bg3,color:T.muted,border:`1px solid ${T.border}`,borderRadius:5,cursor:'pointer',fontSize:12}}>{l}</button>)}

const ID_TYPES=[{id:'dl',icon:'🪪',label:"Driver's License",sub:'Front & back'},{id:'state_id',icon:'🪪',label:'State ID',sub:'Front & back'},{id:'passport',icon:'📘',label:'U.S. Passport',sub:'Photo page only'},{id:'passport_card',icon:'💳',label:'Passport Card',sub:'Front & back'},{id:'military',icon:'🎖️',label:'Military ID',sub:'Front only'},{id:'federal',icon:'🏛️',label:'Federal Employee ID',sub:'Front & back'}];
const US_STATES=['AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA','KS','KY','LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY'];

function IDZone({label,sub,value,onChange}){
  const inp=useRef(null),[over,setOver]=useState(false),[scanning,setScanning]=useState(false);
  const handle=f=>{if(!f)return;setScanning(true);const r=new FileReader();r.onload=ev=>setTimeout(()=>{onChange({file:f,dataUrl:ev.target.result});setScanning(false);},1400);r.readAsDataURL(f);};
  return(
    <div className={`id-zone${over?' over':''}${value?' filled':''}`}
      onDragOver={e=>{e.preventDefault();setOver(true);}} onDragLeave={()=>setOver(false)}
      onDrop={e=>{e.preventDefault();setOver(false);handle(e.dataTransfer.files[0]);}}
      onClick={()=>!value&&inp.current.click()}>
      {scanning&&<div className="scan-overlay"><div className="scan-line"/></div>}
      {!value&&!scanning&&<><div style={{fontSize:28,marginBottom:6}}>📷</div><div style={{color:T.text,fontWeight:600,fontSize:13,marginBottom:3}}>{label}</div><div style={{color:T.muted,fontSize:12}}>{sub}</div></>}
      {scanning&&<><div style={{fontSize:24,marginBottom:6}}>🔍</div><div style={{color:T.accentHi,fontSize:12,fontWeight:600}}>Scanning…</div></>}
      {value&&!scanning&&(
        <div style={{position:'relative'}}>
          <img src={value.dataUrl} alt="id" style={{maxWidth:'100%',maxHeight:160,borderRadius:5,objectFit:'contain'}}/>
          <div style={{marginTop:6,display:'flex',alignItems:'center',justifyContent:'center',gap:5}}><span style={{color:T.ok}}>✓</span><span style={{color:T.ok,fontSize:12,fontWeight:600}}>{value.file.name}</span></div>
          <button onClick={e=>{e.stopPropagation();onChange(null);}} className="btn" style={{position:'absolute',top:-8,right:-8,width:20,height:20,background:T.err,color:'#fff',borderRadius:'50%',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center',padding:0}}>×</button>
        </div>
      )}
      <input ref={inp} type="file" accept="image/*,.pdf" style={{display:'none'}} onChange={e=>handle(e.target.files[0])}/>
    </div>
  );
}

function VerifyView({onVerified}){
  const [step,setStep]=useState(0);
  const [form,setForm]=useState({firstName:'',lastName:'',middleName:'',dob:'',ssn4:'',email:'',phone:'',address:'',city:'',state:'TX',zip:''});
  const [idType,setIdType]=useState('');
  const [idFront,setIdFront]=useState(null),[idBack,setIdBack]=useState(null);
  const [selfie,setSelfie]=useState(null);
  const [camErr,setCamErr]=useState(null),[camReady,setCamReady]=useState(false);
  const [progress,setProgress]=useState(0);
  const videoRef=useRef(null),cvRef=useRef(null),streamRef=useRef(null);
  const needsBack=idType&&idType!=='passport'&&idType!=='military';

  const startCam=useCallback(async()=>{setCamErr(null);setCamReady(false);try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});streamRef.current=s;if(videoRef.current){videoRef.current.srcObject=s;await videoRef.current.play();}setCamReady(true);}catch(e){setCamErr(e.message||'Camera denied');}},[]);
  const stopCam=useCallback(()=>{streamRef.current?.getTracks().forEach(t=>t.stop());streamRef.current=null;setCamReady(false);},[]);
  useEffect(()=>{if(step===4)startCam();else stopCam();return stopCam;},[step]);

  const capture=()=>{const v=videoRef.current,c=cvRef.current;if(!v||!c)return;c.width=v.videoWidth;c.height=v.videoHeight;c.getContext('2d').drawImage(v,0,0);setSelfie(c.toDataURL('image/jpeg',.92));stopCam();setStep(5);};

  useEffect(()=>{
    if(step!==5)return;setProgress(0);
    const t=[18,38,58,78,92,100],d=[450,850,750,900,650,550];let i=0;
    const run=async()=>{if(i>=t.length){setTimeout(()=>setStep(6),400);return;}await new Promise(r=>setTimeout(r,d[i]));setProgress(t[i++]);run();};run();
  },[step]);

  const canNext=()=>{
    if(step===0)return!!(form.firstName&&form.lastName&&form.dob&&form.ssn4&&form.email&&form.address&&form.city&&form.zip);
    if(step===1)return!!idType;if(step===2)return!!idFront;if(step===3)return!needsBack||!!idBack;return true;
  };
  const next=()=>{if(step===2&&!needsBack){setStep(4);return;}setStep(s=>s+1);};
  const back=()=>{if(step===4&&!needsBack){setStep(2);return;}setStep(s=>Math.max(0,s-1));};

  if(step===6){
    const identity={...form,idType,idFront,idBack,selfie};
    IdentityStore.save(identity);
    return(
      <div className="fade-up" style={{maxWidth:480,margin:'50px auto',padding:'0 18px',textAlign:'center'}}>
        <div className="check-pop" style={{width:72,height:72,borderRadius:'50%',background:T.ok,display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,margin:'0 auto 20px'}}>✓</div>
        <h2 style={{fontFamily:"'Playfair Display',serif",color:T.text,fontSize:28,marginBottom:8}}>Identity Verified</h2>
        <p style={{color:T.muted,fontSize:14,lineHeight:1.8,marginBottom:10}}>{form.firstName} {form.lastName}'s identity has been confirmed.</p>
        <p style={{color:T.accentHi,fontSize:13,marginBottom:28}}>✓ You won't need to verify again for <strong>{SESSION_DAYS} days</strong>.</p>
        <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:12,padding:'16px 18px',marginBottom:24,textAlign:'left'}}>
          {[['Name',`${form.firstName}${form.middleName?' '+form.middleName:''} ${form.lastName}`],['DOB',form.dob],['Email',form.email],['Address',`${form.address}, ${form.city}, ${form.state} ${form.zip}`],['ID Type',ID_TYPES.find(t=>t.id===idType)?.label||idType],['Session expires',`${SESSION_DAYS} days from now`]].map(([k,v])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:`1px solid ${T.border}`}}>
              <span style={{color:T.muted,fontSize:12}}>{k}</span><span style={{color:T.text,fontSize:12,fontWeight:500,maxWidth:'65%',textAlign:'right'}}>{v}</span>
            </div>
          ))}
          {selfie&&<div style={{marginTop:12,display:'flex',alignItems:'center',gap:10}}><img src={selfie} alt="" style={{width:46,height:46,borderRadius:'50%',objectFit:'cover',border:`2px solid ${T.ok}`}}/><div><div style={{color:T.text,fontSize:12,fontWeight:600}}>Biometric</div><div style={{color:T.ok,fontSize:11}}>✓ Liveness confirmed</div></div></div>}
        </div>
        <button className="btn" onClick={()=>onVerified(identity)} style={{padding:'12px 36px',background:T.accent,color:'#000',border:'none',borderRadius:9,fontWeight:700,fontSize:15}}>Proceed to Sign →</button>
      </div>
    );
  }

  if(step===5)return(<div className="fade-up" style={{maxWidth:380,margin:'80px auto',padding:'0 20px',textAlign:'center'}}><Spinner size={46}/><h3 style={{fontFamily:"'Playfair Display',serif",color:T.text,fontSize:22,margin:'20px 0 8px'}}>Analyzing Identity…</h3><p style={{color:T.muted,fontSize:13,lineHeight:1.7,marginBottom:24}}>Document checks, biometric comparison, fraud signals.</p><div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:10,padding:'16px'}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:7}}><span style={{color:T.muted,fontSize:12}}>Progress</span><span style={{color:T.accent,fontSize:12,fontFamily:"'IBM Plex Mono',monospace"}}>{progress}%</span></div><div style={{height:5,background:T.bg3,borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',background:`linear-gradient(90deg,${T.accent},${T.accentHi})`,width:`${progress}%`,transition:'width .4s'}}/></div></div></div>);

  return(
    <div className="fade-up" style={{maxWidth:600,margin:'0 auto',padding:'24px 18px 48px'}}>
      <h2 style={{fontFamily:"'Playfair Display',serif",color:T.text,fontSize:22,marginBottom:4}}>Identity Verification</h2>
      <p style={{color:T.muted,fontSize:13,lineHeight:1.6,marginBottom:6}}>One-time setup — you won't need to do this again for {SESSION_DAYS} days.</p>
      <div style={{display:'flex',gap:6,marginBottom:18}}>
        {Array.from({length:needsBack?5:4},(_,i)=>{const cur=step>=4&&!needsBack?step-1:step;return(<div key={i} style={{width:8,height:8,borderRadius:'50%',background:i===cur?T.accent:i<cur?T.ok:T.border,transform:i===cur?'scale(1.3)':'none',transition:'all .25s'}});})}
      </div>

      {/* Step 0: Personal */}
      {step===0&&(
        <div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}><div style={{width:28,height:28,borderRadius:'50%',background:T.accent,color:'#000',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:12,flexShrink:0}}>1</div><h3 style={{color:T.text,fontSize:15,fontWeight:600}}>Personal Information</h3></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div><label className="fl">First Name *</label><input className="fi" value={form.firstName} onChange={e=>setForm(p=>({...p,firstName:e.target.value}))} placeholder="Legal first name"/></div>
            <div><label className="fl">Middle Name</label><input className="fi" value={form.middleName} onChange={e=>setForm(p=>({...p,middleName:e.target.value}))} placeholder="Optional"/></div>
            <div style={{gridColumn:'span 2'}}><label className="fl">Last Name *</label><input className="fi" value={form.lastName} onChange={e=>setForm(p=>({...p,lastName:e.target.value}))} placeholder="Legal last name"/></div>
            <div><label className="fl">Date of Birth *</label><input className="fi" type="date" value={form.dob} onChange={e=>setForm(p=>({...p,dob:e.target.value}))}/></div>
            <div><label className="fl">Last 4 SSN *</label><input className="fi" value={form.ssn4} onChange={e=>setForm(p=>({...p,ssn4:e.target.value.replace(/\D/g,'').slice(0,4)}))} placeholder="••••" maxLength={4} inputMode="numeric"/></div>
            <div style={{gridColumn:'span 2'}}><label className="fl">Email *</label><input className="fi" type="email" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} placeholder="you@example.com"/></div>
            <div><label className="fl">Phone</label><input className="fi" type="tel" value={form.phone} onChange={e=>setForm(p=>({...p,phone:e.target.value}))} placeholder="(555) 555-5555"/></div>
            <div style={{gridColumn:'span 2'}}><label className="fl">Street Address *</label><input className="fi" value={form.address} onChange={e=>setForm(p=>({...p,address:e.target.value}))} placeholder="123 Main St"/></div>
            <div><label className="fl">City *</label><input className="fi" value={form.city} onChange={e=>setForm(p=>({...p,city:e.target.value}))} placeholder="City"/></div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              <div><label className="fl">State *</label><select className="fi" value={form.state} onChange={e=>setForm(p=>({...p,state:e.target.value}))}>{US_STATES.map(s=><option key={s}>{s}</option>)}</select></div>
              <div><label className="fl">ZIP *</label><input className="fi" value={form.zip} onChange={e=>setForm(p=>({...p,zip:e.target.value.slice(0,10)}))} placeholder="77001" inputMode="numeric"/></div>
            </div>
          </div>
        </div>
      )}

      {/* Step 1: ID type */}
      {step===1&&(
        <div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}><div style={{width:28,height:28,borderRadius:'50%',background:T.accent,color:'#000',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:12,flexShrink:0}}>2</div><h3 style={{color:T.text,fontSize:15,fontWeight:600}}>Select Government-Issued ID</h3></div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(155px,1fr))',gap:10}}>
            {ID_TYPES.map(t=>(
              <div key={t.id} onClick={()=>setIdType(t.id)} style={{background:T.bg2,border:`2px solid ${idType===t.id?T.accent:T.border}`,borderRadius:10,padding:'13px 11px',cursor:'pointer',transition:'border-color .15s'}}>
                <div style={{fontSize:24,marginBottom:6}}>{t.icon}</div>
                <div style={{color:T.text,fontWeight:600,fontSize:13,marginBottom:2}}>{t.label}</div>
                <div style={{color:T.muted,fontSize:11}}>{t.sub}</div>
                {idType===t.id&&<div style={{color:T.accent,fontSize:10,fontWeight:700,marginTop:5}}>✓ Selected</div>}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Step 2: Front */}
      {step===2&&(
        <div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}><div style={{width:28,height:28,borderRadius:'50%',background:T.accent,color:'#000',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:12,flexShrink:0}}>3</div><div><h3 style={{color:T.text,fontSize:15,fontWeight:600}}>Front of {ID_TYPES.find(t=>t.id===idType)?.label}</h3><p style={{color:T.muted,fontSize:11,marginTop:2}}>Flat, good light, all corners visible</p></div></div>
          <IDZone label="Upload front of ID" sub="Drag & drop or tap to browse" value={idFront} onChange={setIdFront}/>
        </div>
      )}

      {/* Step 3: Back */}
      {step===3&&needsBack&&(
        <div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}><div style={{width:28,height:28,borderRadius:'50%',background:T.accent,color:'#000',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:12,flexShrink:0}}>4</div><div><h3 style={{color:T.text,fontSize:15,fontWeight:600}}>Back of {ID_TYPES.find(t=>t.id===idType)?.label}</h3><p style={{color:T.muted,fontSize:11,marginTop:2}}>Barcode / magnetic stripe side</p></div></div>
          <IDZone label="Upload back of ID" sub="Barcode must be clearly visible" value={idBack} onChange={setIdBack}/>
        </div>
      )}

      {/* Step 4: Selfie */}
      {step===4&&(
        <div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}><div style={{width:28,height:28,borderRadius:'50%',background:T.accent,color:'#000',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:12,flexShrink:0}}>{needsBack?'5':'4'}</div><div><h3 style={{color:T.text,fontSize:15,fontWeight:600}}>Selfie — Liveness Check</h3><p style={{color:T.muted,fontSize:11,marginTop:2}}>Center face in oval, then tap Capture</p></div></div>
          <div className="webcam-wrap" style={{border:`2px solid ${camReady?T.accent:T.border}`}}>
            {!camReady&&!camErr&&<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:260,gap:10}}><Spinner size={32}/><span style={{color:T.muted,fontSize:13}}>Starting camera…</span></div>}
            {camErr&&<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:260,gap:8,padding:'0 20px'}}><span style={{fontSize:28}}>📷</span><span style={{color:T.err,fontSize:13,textAlign:'center'}}>{camErr}</span><button className="btn" onClick={startCam} style={{padding:'7px 16px',background:T.accent,color:'#000',border:'none',borderRadius:6,fontWeight:700,fontSize:12,marginTop:4}}>Retry</button></div>}
            <video ref={videoRef} autoPlay playsInline muted style={{display:camReady?'block':'none'}}/>
            <canvas ref={cvRef} style={{display:'none'}}/>
            {camReady&&<><div className="face-oval-wrap"><div className="face-oval"/></div><div style={{position:'absolute',bottom:12,left:'50%',transform:'translateX(-50%)'}}><button className="btn" onClick={capture} style={{padding:'9px 26px',background:T.accent,color:'#000',border:'none',borderRadius:8,fontWeight:700,fontSize:14,boxShadow:'0 4px 18px rgba(0,0,0,.6)'}}>📸 Capture</button></div></>}
          </div>
          {camErr&&<div style={{marginTop:12}}><IDZone label="Upload a selfie photo" sub="Front-facing, no sunglasses" value={selfie?{dataUrl:selfie,file:{name:'selfie.jpg'}}:null} onChange={v=>{if(v){setSelfie(v.dataUrl);setStep(5);}else setSelfie(null);}}/></div>}
        </div>
      )}

      {step<5&&(
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:22}}>
          <button onClick={back} className="btn" style={{padding:'9px 16px',background:'none',border:`1px solid ${T.border}`,color:T.muted,borderRadius:7,fontSize:13,visibility:step===0?'hidden':'visible'}}>← Back</button>
          {step<4&&<button onClick={next} disabled={!canNext()} className="btn" style={{padding:'9px 24px',background:canNext()?T.accent:T.bg3,color:canNext()?'#000':T.muted,border:'none',borderRadius:7,fontWeight:700,fontSize:14}}>Continue →</button>}
          {step===4&&camErr&&selfie&&<button onClick={()=>setStep(5)} className="btn" style={{padding:'9px 24px',background:T.accent,color:'#000',border:'none',borderRadius:7,fontWeight:700,fontSize:14}}>Continue →</button>}
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════
   HOME VIEW
════════════════════════════════════════ */

        <div style={{display:'inline-flex',alignItems:'center',gap:8,background:T.bg2,border:`1px solid ${T.hi}`,borderRadius:8,padding:'5px 14px',marginBottom:22}}>
          <span style={{color:T.accent}}>⛽</span>
          <span style={{color:T.muted,fontSize:10,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:'1.5px'}}>OIL & GAS DOCUMENT PLATFORM</span>
        </div>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:'clamp(24px,6vw,48px)',color:T.text,lineHeight:1.15,marginBottom:14}}>
          Sign. Verify. Notarize.<br/>
          <span style={{color:T.accent,fontStyle:'italic'}}>Built for O&G.</span>

          <div style={{display:'inline-flex',alignItems:'center',gap:10,background:`${T.ok}0D`,border:`1px solid ${T.ok}30`,borderRadius:12,padding:'8px 18px',marginBottom:20}}>
            {identity.selfie&&<img src={identity.selfie} alt="" style={{width:32,height:32,borderRadius:'50%',objectFit:'cover',border:`2px solid ${T.ok}`}}/>}
            <div style={{textAlign:'left'}}>
              <div style={{color:T.text,fontSize:13,fontWeight:600}}>Welcome back, {identity.firstName}!</div>
              <div style={{color:T.ok,fontSize:11}}>✓ Identity verified · {days} days remaining</div>

        <button className="btn" onClick={onStart} style={{padding:'13px 38px',background:T.accent,color:'#000',border:'none',borderRadius:10,fontSize:15,fontWeight:700,fontFamily:"'IBM Plex Sans',sans-serif",boxShadow:`0 0 48px ${T.glow},0 4px 24px rgba(0,0,0,.5)`,display:'block',margin:'0 auto'}}>

          ['📍','Adobe Sign Style','Place & resize fields anywhere on any PDF. Required field markers enforce completion.'],
          ['🔏','OneNotary RON',   'Live video session in a new tab. Real API with demo mode for testing.'],

            <div style={{color:T.text,fontWeight:600,fontSize:13,marginBottom:5}}>{title}</div>

/* ════════════════════════════════════════
   UPLOAD VIEW
════════════════════════════════════════ */
function UploadView({onFile}){
  const [over,setOver]=useState(false),inp=useRef(null);
  const handle=f=>{if(!f)return;const ok=f.type==='application/pdf'||f.type.startsWith('image/')||f.name?.endsWith('.pdf');if(!ok){alert('Please upload a PDF, PNG, or JPG.');return;}onFile(f);};
  return(
    <div className="fade-up" style={{maxWidth:520,margin:'48px auto',padding:'0 18px'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}><span style={{color:T.accent,fontSize:20}}>📄</span><h2 style={{fontFamily:"'Playfair Display',serif",color:T.text,fontSize:24}}>Upload Document</h2></div>
      <p style={{color:T.muted,fontSize:13,marginBottom:20}}>PDF, PNG, or JPG · Processed entirely in your browser</p>
      <div onDragOver={e=>{e.preventDefault();setOver(true);}} onDragLeave={()=>setOver(false)} onDrop={e=>{e.preventDefault();setOver(false);handle(e.dataTransfer.files[0]);}} onClick={()=>inp.current.click()}
        style={{border:`2px dashed ${over?T.accent:T.border}`,borderRadius:12,padding:'52px 20px',textAlign:'center',cursor:'pointer',background:over?T.glow:T.bg2,transition:'all .2s'}}>
        <div style={{fontSize:48,marginBottom:10}}>📄</div>
        <div style={{color:T.text,fontWeight:600,fontSize:16,marginBottom:5}}>{over?'Drop it!':'Click to choose a file'}</div>
        <div style={{color:T.muted,fontSize:13,marginBottom:18}}>or drag & drop here</div>
        <div style={{display:'flex',justifyContent:'center',gap:6}}>{['PDF','PNG','JPG'].map(t=><span key={t} style={{background:T.bg3,border:`1px solid ${T.border}`,color:T.muted,padding:'2px 9px',borderRadius:4,fontSize:11,fontFamily:"'IBM Plex Mono',monospace"}}>{t}</span>)}</div>
        <input ref={inp} type="file" accept=".pdf,.png,.jpg,.jpeg" style={{display:'none'}} onChange={e=>handle(e.target.files[0])}/>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   COMPLETE VIEW
════════════════════════════════════════ */
function CompleteView({file,fields,identity,notarized,notaryInfo,onReset}){
  const ts=new Date().toLocaleString();
  useEffect(()=>{
    DocStore.add({name:file?.name||'Unknown',status:notarized?'notarized':'signed',signer:identity?`${identity.firstName} ${identity.lastName}`:'',size:file?(file.size/1024).toFixed(1)+' KB':'',fields:fields?.length||0,notary:notarized?(notaryInfo?.notary_name||'OneNotary RON'):'',});
  },[]);
  return(
    <div className="fade-up" style={{maxWidth:480,margin:'48px auto',padding:'0 18px 32px',textAlign:'center'}}>
      <div style={{fontSize:52,marginBottom:14}}>{notarized?'🔏':'✅'}</div>
      <h2 style={{fontFamily:"'Playfair Display',serif",color:T.text,fontSize:28,marginBottom:8}}>Document {notarized?'Notarized':'Signed'}</h2>
      <p style={{color:T.muted,fontSize:14,lineHeight:1.8,maxWidth:360,margin:'0 auto 24px'}}>{notarized?`Notarized by ${notaryInfo?.notary_name||'a commissioned officer'}. Legally binding under RON statutes.`:'Digitally signed and ready for distribution.'}</p>
      <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:12,padding:'16px 18px',marginBottom:20,textAlign:'left'}}>
        <div style={{color:T.muted,fontSize:9,fontFamily:"'IBM Plex Mono',monospace",textTransform:'uppercase',letterSpacing:'1.8px',marginBottom:12}}>Session Summary</div>
        {[['Document',file?.name||'—'],['Signer',identity?`${identity.firstName} ${identity.lastName}`:'—'],['ID Verified',identity?`✓ ${identity.idType}`:'—'],['Fields',`${fields?.length||0} placed`],['Notarized',notarized?`Yes — ${notaryInfo?.notary_name||'OneNotary'}`:'No'],['Completed',ts]].map(([k,v])=>(
          <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:`1px solid ${T.border}`}}>
            <span style={{color:T.muted,fontSize:12}}>{k}</span>
            <span style={{color:k==='ID Verified'?T.ok:T.text,fontSize:12,fontWeight:500,maxWidth:'62%',textAlign:'right',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{v}</span>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}}>
        <button className="btn" style={{padding:'10px 20px',background:T.accent,color:'#000',border:'none',borderRadius:8,fontWeight:700,fontSize:14}}>⬇️ Download PDF</button>
        <button className="btn" style={{padding:'10px 16px',background:T.bg2,color:T.text,border:`1px solid ${T.border}`,borderRadius:8,fontSize:13}}>📧 Email Copy</button>
        <button onClick={onReset} className="btn" style={{padding:'10px 16px',background:'none',color:T.muted,border:`1px solid ${T.border}`,borderRadius:8,fontSize:13}}>+ New Document</button>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   ROOT APP
════════════════════════════════════════ */
function App(){
  // Load saved identity on first render
  const [identity,setIdentity]=useState(()=>IdentityStore.load());
  const [view,setView]=useState('home');
  const [file,setFile]=useState(null);
  const [fields,setFields]=useState([]);
  const [dims,setDims]=useState(null);
  const [signedFile,setSignedFile]=useState(null);
  const [notarized,setNotarized]=useState(false);
  const [notaryInfo,setNotaryInfo]=useState(null);
  const [showLog,setShowLog]=useState(false);
  const [logCount,setLogCount]=useState(()=>DocStore.all().length);

  useEffect(()=>{if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});},[]);
  useEffect(()=>{if(view==='home')setLogCount(DocStore.all().length);},[view]);

  const reset=()=>{setView('home');setFile(null);setFields([]);setDims(null);setSignedFile(null);setNotarized(false);setNotaryInfo(null);};

  const startSigning=()=>{
    setView('upload');
  };

  const afterUpload=f=>{
    setFile(f);
    // Skip ID verification if still valid
    if(IdentityStore.load()){
      setView('sign');
    } else {
      setView('verify');
    }
  };

  const afterVerify=id=>{
    setIdentity(id);
    setView('sign');
  };

  const switchUser=()=>{
    IdentityStore.clear();
    setIdentity(null);
    setView('verify');
  };

  return(
    <>
      <NavBar current={view} identity={identity} onHome={reset} onLog={()=>setShowLog(true)} logCount={logCount} onSwitchUser={switchUser}/>
      {showLog&&<LogPanel onClose={()=>setShowLog(false)}/>}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:view==='sign'?'hidden':'auto',minHeight:0}}>
        {view==='home'     &&<HomeView    onStart={startSigning} identity={identity}/>}
        {view==='upload'   &&<UploadView  onFile={afterUpload}/>}
        {view==='verify'   &&<VerifyView  onVerified={afterVerify}/>}
        {view==='sign'     &&<SignView    file={file} identity={identity}
            onDone={(f,d)=>{setFields(f);setDims(d);setView('done');}}
            onNotarize={(f,d,sf)=>{setFields(f);setDims(d);setSignedFile(sf);setView('notarize');}}/>}
        {view==='notarize' &&<NotarizeView file={file} signedFile={signedFile} fields={fields} identity={identity}
            onComplete={(n,info)=>{setNotarized(n);setNotaryInfo(info);setView('done');}}
            onSkip={()=>setView('done')}/>}
        {view==='done'     &&<CompleteView file={file} fields={fields} identity={identity} notarized={notarized} notaryInfo={notaryInfo} onReset={reset}/>}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
